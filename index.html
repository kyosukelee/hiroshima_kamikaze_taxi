<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>広島神風タクシー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --font:'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
  --primary:#1A6BC4;   /* メインブルー */
  --accent:#3AABF0;    /* アクセントブルー */
  --dark:#0D1B2A;
  --card-bg:#FFFFFF;
  --page-bg:#EAF4FF;   /* 淡いブルー白 */
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:var(--font);}

/* ── HUD（ゲーム中オーバーレイ）────────────────── */
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;font-family:var(--font);}
.hp{position:absolute;background:rgba(15,15,25,.78);border:1.5px solid rgba(255,220,100,.6);
  border-radius:6px;padding:4px 10px;color:#fff;font-size:14px;font-weight:700;}
#hm{top:12px;left:12px;color:#FFD060;font-size:17px;}
#ht{top:12px;left:50%;transform:translateX(-50%);font-size:19px;min-width:82px;text-align:center;}
#ht.red{color:#ff5555;animation:blink .5s infinite;}
#hc{top:12px;right:12px;color:#FF9020;font-size:17px;}
#hs{bottom:193px;left:12px;}
#hstatus{bottom:193px;left:128px;font-size:13px;font-weight:700;}
#hstatus.vacant  {color:#44FF88;border-color:rgba(68,255,136,.6);}
#hstatus.occupied{color:#FFAA44;border-color:rgba(255,170,68,.6);}
#hf{display:none;} /* 旧fare表示は非表示 */
/* ── 運賃メーター ────────────────────────────────── */
#meter{position:absolute;bottom:95px;left:8px;
  background:#0A0A0A;border:2px solid #444;border-radius:6px;
  padding:4px 10px 4px 10px;display:none;flex-direction:column;
  align-items:center;min-width:90px;
  box-shadow:0 0 8px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.06);}
#meter-label{font-size:9px;font-weight:700;color:#888;letter-spacing:.12em;
  text-transform:uppercase;margin-bottom:1px;}
#meter-value{font-size:20px;font-weight:900;color:#FF4400;letter-spacing:.04em;
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 8px rgba(255,80,0,.7);
  transition:color .08s,text-shadow .08s;}
#meter-value.flash{color:#FFFFFF;text-shadow:0 0 14px rgba(255,255,255,.9);}
#meter-unit{font-size:9px;color:#666;margin-top:1px;}
#hd{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);
  background:rgba(15,15,25,.78);border:1.5px solid rgba(255,120,120,.6);
  border-radius:6px;padding:4px 14px;color:#FFCCCC;font-size:14px;font-weight:700;
  text-align:center;display:none;white-space:nowrap;}
#et{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);
  font-size:40px;font-weight:900;
  text-shadow:3px 3px 0 rgba(0,0,0,.7),-1px -1px 0 rgba(0,0,0,.4);
  pointer-events:none;opacity:0;letter-spacing:.04em;}
#st{position:absolute;top:52%;left:50%;transform:translateX(-50%);
  font-size:14px;font-weight:700;color:#fff;
  text-shadow:1px 1px 3px rgba(0,0,0,.9);text-align:center;pointer-events:none;
  opacity:0;white-space:pre-line;line-height:1.7;}
#mm{position:absolute;top:60px;right:12px;width:110px;height:110px;
  background:rgba(10,20,30,.88);border:1.5px solid rgba(255,220,100,.6);
  border-radius:50%;overflow:hidden;}
#area-label{position:absolute;bottom:168px;right:12px;font-size:11px;font-weight:700;
  color:rgba(220,235,255,.75);text-shadow:1px 1px 2px rgba(0,0,0,.8);pointer-events:none;}

/* ── タッチコントロール ────────────────────────── */
#tc{position:fixed;bottom:0;left:0;width:100%;height:176px;z-index:20;
  display:flex;justify-content:space-between;align-items:stretch;
  padding:6px 8px;pointer-events:none;}
#tc-left{display:flex;flex-direction:row;gap:4px;width:28%;pointer-events:auto;align-items:stretch;height:calc(50% - 2px);align-self:flex-end;}
#tc-mid{display:flex;flex-direction:column;width:20%;pointer-events:auto;height:calc(50% - 2px);align-self:flex-end;}
#tc-right{display:flex;flex-direction:column;gap:4px;width:28%;pointer-events:auto;}
.tb{background:rgba(20,20,30,.6);border:1.5px solid rgba(255,220,100,.55);
  border-radius:10px;color:#FFD060;font-family:var(--font);font-weight:700;
  font-size:20px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;text-align:center;line-height:1.25;transition:background .08s;flex:1;}
.tb.on,.tb:active{background:rgba(255,180,0,.35);}
#tb-dash{background:rgba(140,0,0,.5);border-color:rgba(255,80,80,.65);color:#FF9999;font-size:13px;}
#tb-gas {background:rgba(0,90,10,.5) ;border-color:rgba(80,255,100,.65);color:#88FF88;}
#tb-rev {background:rgba(0,40,90,.5) ;border-color:rgba(80,160,255,.65);color:#88CCFF;}
#tb-brk {background:rgba(80,40,0,.5) ;border-color:rgba(255,160,60,.65);color:#FFCC88;}

/* ── 乗客タイマーバー ─────────────────────────── */
#pax-bar{position:absolute;bottom:198px;left:50%;transform:translateX(-50%);
  width:200px;height:7px;background:rgba(0,0,0,.4);border-radius:4px;display:none;overflow:hidden;
  border:1px solid rgba(255,255,255,.2);}
#pax-fill{height:100%;background:#44FF88;border-radius:4px;transition:width .1s linear;}

/* ── 共通スクリーン ───────────────────────────── */
.scr{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:var(--font);}

/* ── タイトル画面 ─────────────────────────────── */
#title{background:linear-gradient(160deg,#EAF4FF 0%,#C8E4FF 50%,#A0CFFF 100%);}
#title h1{font-size:32px;font-weight:900;color:#0A3D7A;
  text-shadow:3px 3px 0 rgba(26,107,196,.2);
  text-align:center;line-height:1.4;margin-bottom:4px;}
#title .sub{color:#1A4A7A;font-size:13px;font-weight:700;margin-bottom:4px;}
#title .sub2{color:#2A6AAA;font-size:11px;margin-bottom:18px;}
.op{color:#1A3A5A;font-size:13px;margin:3px 12px;text-align:center;}
.op b{color:var(--primary);}

/* ── スタートボタン共通 ───────────────────────── */
.start-btn{margin-top:22px;padding:14px 48px;font-size:20px;font-weight:900;
  font-family:var(--font);
  background:linear-gradient(135deg,#1A6BC4,#3AABF0);
  color:#fff;border:none;border-radius:10px;cursor:pointer;
  box-shadow:0 4px 0 #0A3D7A,0 6px 16px rgba(26,107,196,.35);
  letter-spacing:.06em;transition:transform .08s,box-shadow .08s;}
.start-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #0A3D7A,0 3px 8px rgba(26,107,196,.2);}

/* ── キャラ選択画面 ───────────────────────────── */
#charsel{background:linear-gradient(160deg,#EAF4FF 0%,#C8E4FF 50%,#A0CFFF 100%);display:none;overflow-y:auto;}
#charsel h2{font-size:22px;font-weight:900;color:#0A3D7A;margin-bottom:14px;text-align:center;}
.char-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:min(520px,96vw);padding:0 8px;}
.char-card{background:var(--card-bg);border:2.5px solid #B0D4F0;border-radius:12px;
  padding:12px 12px;cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.08);}
.char-card:hover,.char-card.sel{border-color:var(--primary);box-shadow:0 4px 16px rgba(26,107,196,.28);}
.char-card .cn{font-size:15px;font-weight:900;color:var(--dark);margin-bottom:3px;}
.char-card .cq{font-size:11px;color:#777;margin-bottom:7px;}
.char-car{width:48px;height:28px;border-radius:5px;margin:0 auto 8px;border:2px solid rgba(0,0,0,.12);}
.stat-row{display:flex;align-items:center;gap:5px;margin:3px 0;font-size:11px;}
.stat-lbl{width:34px;color:#555;text-align:left;font-weight:700;}
.stat-bar{flex:1;height:7px;background:#D8EAF8;border-radius:4px;overflow:hidden;}
.stat-fill{height:100%;border-radius:4px;transition:width .3s;}

/* ── 車両選択画面 ─────────────────────────────── */
#vehiclesel{background:linear-gradient(160deg,#EAF4FF 0%,#C8E4FF 50%,#A0CFFF 100%);display:none;overflow-y:auto;}
#vehiclesel h2{font-size:22px;font-weight:900;color:#0A3D7A;margin-bottom:14px;text-align:center;}
.veh-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:min(540px,96vw);padding:0 8px;}
.veh-card{background:var(--card-bg);border:2.5px solid #B0D4F0;border-radius:12px;
  padding:10px 12px;cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.08);}
.veh-card:hover,.veh-card.sel{border-color:var(--primary);box-shadow:0 4px 16px rgba(26,107,196,.28);}
.veh-card .vn{font-size:15px;font-weight:900;color:var(--dark);margin-bottom:2px;}
.veh-card .vd{font-size:10px;color:#888;margin-bottom:7px;}
.veh-preview{width:100%;height:52px;border-radius:6px;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border:1.5px solid rgba(0,0,0,.1);background:#F5F8FC;}
#result{background:linear-gradient(160deg,#EAF4FF 0%,#C8E4FF 50%,#A0CFFF 100%);display:none;}
#result h1{font-size:52px;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.1);margin-bottom:14px;}
.rd{font-size:20px;font-weight:700;color:var(--dark);margin:5px 0;}

/* ── アニメーション ───────────────────────────── */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes comboPulse{0%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.22)}100%{transform:translate(-50%,-50%) scale(1)}}

/* ── レスポンシブ（横画面）─────────────────────── */
@media (orientation:landscape) and (max-height:500px){
  #tc{height:120px;}
  #hs{bottom:130px;}#hstatus{bottom:130px;}#hf{bottom:130px;}
  #hd{bottom:108px;}#pax-bar{bottom:142px;}#area-label{bottom:112px;}
  #mm{width:84px;height:84px;top:48px;}
  #meter{bottom:65px;left:8px;}
}
</style>
</head>
<body>

<div id="title" class="scr">
  <h1>広島神風タクシー</h1>
  <div class="op">🟢 緑マーカーに近づき<b>ゆっくり停車</b> → 乗車</div>
  <div class="op">🔴 赤マーカーの目的地へ<b>爆走</b>して届ける！</div>
  <div class="op">🟣 <b>空港</b>は高速道路で！</div>
  <div class="op" style="margin-top:8px"><b>W / ↑</b> アクセル &nbsp;
    <b>S / ↓</b> ブレーキ &nbsp; <b>A D / ← →</b> ステアリング</div>
  <div class="op"><b>Shift</b> 神風ダッシュ</div>
  <button class="start-btn" onclick="showCharSel()">ドライバー選択 →</button>
</div>

<div id="charsel" class="scr">
  <h2>🚕 ドライバー選択</h2>
  <div class="char-grid" id="char-grid"></div>
  <button class="start-btn" style="margin-top:16px;font-size:18px;padding:12px 36px;" onclick="confirmChar()">車両選択 →</button>
</div>

<div id="vehiclesel" class="scr">
  <h2>🚗 車両選択</h2>
  <div class="veh-grid" id="vehicle-grid"></div>
  <button class="start-btn" style="margin-top:16px;font-size:18px;padding:12px 36px;" onclick="confirmVehicle()">出発！ ▶</button>
</div>

<canvas id="gc"></canvas>

<div id="hud">
  <div class="hp" id="hm">💰 ¥<span id="mv">0</span></div>
  <div class="hp" id="ht">⏱ <span id="tv">1:15</span></div>
  <div class="hp" id="hc">🔥 ×<span id="cv">1.0</span></div>
  <div class="hp" id="hs">🚗 <span id="sv">0</span> km/h</div>
  <div class="hp vacant" id="hstatus">空車</div>
  <div id="meter">
    <div id="meter-label">FARE</div>
    <div id="meter-value">¥700</div>
    <div id="meter-unit">円</div>
  </div>
  <div id="hd">➤ <span id="dn">---</span>&nbsp; <span id="dd">0m</span></div>
  <div id="et"></div>
  <div id="st"></div>
  <div id="pax-bar"><div id="pax-fill"></div></div>
  <canvas id="mm" width="110" height="110"></canvas>
  <div id="area-label"></div>
</div>

<div id="tc">
  <div id="tc-left">
    <div class="tb" id="tb-l">◀</div>
    <div class="tb" id="tb-r">▶</div>
  </div>
  <div id="tc-mid">
    <div class="tb" id="tb-dash">神風<br>DASH</div>
  </div>
  <div id="tc-right">
    <div class="tb" id="tb-gas">▲</div>
    <div class="tb" id="tb-rev">▼</div>
  </div>
</div>

<div id="result" class="scr">
  <h1 id="rr"></h1>
  <div class="rd">総売上&nbsp; ¥<span id="rm">0</span></div>
  <div class="rd">ランク&nbsp; <span id="rl">-</span></div>
  <div class="rd" id="rdeliveries" style="color:#aaa;font-size:16px;margin-top:8px;"></div>
  <div class="rd" id="rconsec" style="color:#FFD700;font-size:15px;"></div>
  <button class="start-btn" style="font-size:18px;padding:12px 36px;margin-top:12px;" onclick="showCharSel()">もう一度！</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const BLD_COLS = [0xCC4444,0x4477CC,0x44AA55,0xCC8844,0x8855AA,0x44AACC,0xCC6644,0x7799AA];
const MAX_SPD   = 28;
const DASH_SPD  = 52;
const ACCEL     = 20;
const BRAKE_F   = 30;
const FRICTION  = 3.5;
const TURN_FAST = 0.88;
const TURN_SLOW = 2.1;
const GAME_SCALE = 10;
const PICKUP_R  = 14;   // game units – pickup radius（道路上から確実に拾える）
const ARRIVE_R  = 11;
const ARRIVE_MAX_SPD = 20;
// Map boundaries (extended for full Hiroshima + airport highway)
const MAP_XMIN = -182, MAP_XMAX = 264;
const MAP_ZMIN = -196, MAP_ZMAX = 118;

// ═══════════════════════════════════════════════════════════════
//  CHARACTERS (Phase 5)
// ═══════════════════════════════════════════════════════════════
const CHARS = [
  { name:'鯉太郎',      quote:'カープ魂で届けるけぇ！',
    accel:1.0, maxSpd:1.0, durability:1.0, carCol:0xCC2222,
    stat:[3,3,3], color:'#CC4444' },
  { name:'もみじ姐さん', quote:'しゃんしゃん走るけぇね！',
    accel:0.72, maxSpd:1.42, durability:0.8, carCol:0xCC7700,
    stat:[2,5,2], color:'#DDAA44' },
  { name:'テッパン政',  quote:'アツアツで届けるけぇ！',
    accel:1.62, maxSpd:0.74, durability:1.0, carCol:0xFFD700,
    stat:[5,2,3], color:'#FFD700' },
  { name:'原爆ドームじいちゃん', quote:'この道はワシが一番知っとる',
    accel:0.72, maxSpd:0.74, durability:1.62, carCol:0x333333,
    stat:[2,2,5], color:'#AAAAAA' },
];
let selectedChar = 0;

// ═══════════════════════════════════════════════════════════════
//  VEHICLES (Phase 5 – 車両選択)
// ═══════════════════════════════════════════════════════════════
const VEHICLES = [
  { name:'JPN TAXI',   desc:'安定・全場面で活躍',
    accel:1.0, maxSpd:1.0, durability:1.2, stat:[3,3,4] },
  { name:'コンフォート', desc:'最高速特化・長距離向き',
    accel:1.0, maxSpd:1.3, durability:1.0, stat:[3,4,3] },
  { name:'ワゴン',      desc:'頑丈・遠距離ハイリターン',
    accel:0.7, maxSpd:0.8, durability:1.6, stat:[2,2,5] },
  { name:'TUK-TUK',   desc:'加速最強・小回り抜群',
    accel:1.8, maxSpd:0.7, durability:0.7, stat:[5,2,2] },
];
let selectedVehicle = 0;

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
const G = {
  phase:    'TITLE',
  carState: 'SEEK',
  timer:     75,
  earn:      0,
  deliveries:0,
  spd:       0,
  hdg:       0,
  pos:   new THREE.Vector3(-60, .5, 0),
  tripDist:  0,
  etTimer:   0,
  stTimer:   0,
  pax:  [],
  dest: { pos: new THREE.Vector3(0,0,0), name:'---', mesh:null },
  inp: {
    gasK:false, brkK:false, lK:false, rK:false, dashK:false,
    gasT:false, lT:false, rT:false, dashT:false, revT:false, revK:false
  },
  // Phase 4 additions
  combo:      1.0,
  tripTips:   0,
  paxTimer:   0,
  paxTimerMax:60,
  consec:     0,
  maxConsec:  0,
  driftTimer: 0,
  driftCool:  0,
  dashCool:   0,
  inAir:      false,
  jumpVel:    0,
  jumpCool:   0,
  // 運賃メーター
  meterFare:     700,
  meterNextTick: 1150, // 次にメーターが上がる走行距離(m)
  meterFlash:    0,    // フラッシュタイマー
};

// ═══════════════════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ canvas:document.getElementById('gc'), antialias:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7EC8E3);
scene.fog = new THREE.FogExp2(0x89D4E8, .0038);

const cam = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, .1, 400);
let camPos = new THREE.Vector3(10, 8, 32);

scene.add(new THREE.AmbientLight(0xffffff, .72));
const sun = new THREE.DirectionalLight(0xFFF5E0, .92);
sun.position.set(60, 120, 80); scene.add(sun);
const fill = new THREE.DirectionalLight(0xCCDDFF, .28);
fill.position.set(-40, 30, -60); scene.add(fill);

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function mk(geo, mat, x=0, y=0, z=0) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  return m;
}
function darken(h, f) {
  return (Math.floor((h>>16&255)*f)<<16)|(Math.floor((h>>8&255)*f)<<8)|Math.floor((h&255)*f);
}
function mkMat(col) { return new THREE.MeshLambertMaterial({color:col}); }
function rand(a)    { return a[Math.floor(Math.random()*a.length)]; }

// ═══════════════════════════════════════════════════════════════
//  ROAD MATERIALS (module-level)
// ═══════════════════════════════════════════════════════════════
const roadMat = mkMat(0x2E2E2E);
const hwyMat  = mkMat(0x3A3A3A);
const sdwkMat = mkMat(0x9A9880);
const lineMat = mkMat(0xDDDDAA);

// ═══════════════════════════════════════════════════════════════
//  ROAD SEGMENT DATA (for minimap)
// ═══════════════════════════════════════════════════════════════
const ROAD_SEGS = [];

// ── Obstacle registries (filled at build time) ──────────────────
const OBS_BOX = [];   // {cx, cz, hw, hd}
const OBS_CIR = [];   // {cx, cz, r}
const CAR_R   = 1.6;  // car collision radius

function buildRoadSeg(x1, z1, x2, z2, width, mat, isHwy=false) {
  ROAD_SEGS.push({x1, z1, x2, z2, w:width, isHwy});
  const dx=x2-x1, dz=z2-z1;
  const len=Math.sqrt(dx*dx+dz*dz);
  const angle=Math.atan2(dx, dz);
  const cx=(x1+x2)/2, cz=(z1+z2)/2;
  const yOff = isHwy ? 0.38 : 0.02;

  if (isHwy) {
    // Elevated base structure
    const base = mk(new THREE.BoxGeometry(width+3, 0.34, len+1), mkMat(0x666666), cx, 0.17, cz);
    base.rotation.y = angle; scene.add(base);
    // Guardrails
    const nx=-dz/len, nz=dx/len;
    [-(width/2+0.8), width/2+0.8].forEach(side => {
      const gr = mk(new THREE.BoxGeometry(0.5, 0.6, len), mkMat(0x999999), cx+nx*side, yOff+0.3, cz+nz*side);
      gr.rotation.y = angle; scene.add(gr);
    });
  } else {
    // Sidewalk strip
    const sw = mk(new THREE.BoxGeometry(width+4, 0.03, len+1), sdwkMat, cx, 0.01, cz);
    sw.rotation.y = angle; scene.add(sw);
  }

  // Road surface
  const road = mk(new THREE.BoxGeometry(width, 0.06, len), mat, cx, yOff, cz);
  road.rotation.y = angle; scene.add(road);

  // Center dashed lines (skip for 平和大通り = tram route at z=0)
  const isTramRoute = (z1 === 0 && z2 === 0);
  if (width >= 9 && !isTramRoute) {
    const nL = Math.floor(len/22);
    const dashMat = isHwy ? mkMat(0xFFFFAA) : lineMat;
    for (let i=0; i<nL; i++) {
      const t = (i+0.5)/nL;
      const lx = x1+dx*t, lz = z1+dz*t;
      // 平和大通り（z=0 ±7）との交差部分はスキップ
      if (Math.abs(lz) < 7.5) continue;
      const lm = mk(new THREE.BoxGeometry(0.35, 0.07, isHwy?10:7), dashMat, lx, yOff+0.02, lz);
      lm.rotation.y = angle; scene.add(lm);
    }
    // Highway solid edge lines
    if (isHwy) {
      const nx=-dz/len, nz=dx/len;
      [-(width/2-1.2), width/2-1.2].forEach(side => {
        const el = mk(new THREE.BoxGeometry(0.45, 0.07, len), mkMat(0xFFFFFF),
                      cx+nx*side, yOff+0.02, cz+nz*side);
        el.rotation.y = angle; scene.add(el);
      });
    }
  }
}

    [-170, 68, 2, 3,  3,  7, 3, '宮島口'],       // 旧(-162,65)→宮島端縦・南部横断道に接触のため(-170,68)に移動

    // 南部（平和通り・城東通り回避）
    [-80,64],[-60,64],[-20,64],[-38,64],[12,64],[50,69],
  ];
  TREE_PTS.forEach(([x,z]) => {
    scene.add(mk(new THREE.CylinderGeometry(.25,.3,2.2,5), trunkM, x, 1.1, z));
    scene.add(mk(new THREE.CylinderGeometry(0, 2, 3.2, 6), leafM, x, 3.6, z));
    OBS_CIR.push({ cx:x, cz:z, r:1.6 });

  // ── LANDMARKS ────────────────────────────────────────────────
  buildAtomDome();
  buildHiroshimaCastle();
  buildMiyajimaTorii();
  buildMazdaStadium();
  buildPeaceMuseum();

  // ── HIJIYAMA SLOPE (2-6) ────────────────────────────────────

}

// ═══════════════════════════════════════════════════════════════
//  HIJIYAMA SLOPE – 比治山坂道 (Phase 2-6)
// ═══════════════════════════════════════════════════════════════
// 比治山エリア(x=40〜70, z=40〜75)に坂道を配置
// 坂の上に到達するとY座標が上昇 → ジャンプポイント

const SLOPE_X   = -130;  // 宮島沿岸道路の先（海岸エリア）
const SLOPE_Z   =  74;   // 宮島沿岸(z=92)手前の緑地エリア
const SLOPE_LEN = 10;   // 坂の長さ（22→10: 宮島沿岸道路z=[87.5,96.5]に侵入しないよう短縮）
const SLOPE_H   = 6;    // 坂の高さ
const SLOPE_W   = 9;    // 坂の幅
// ジャンプ判定エリア（坂の頂上付近）
const JUMP_ZONE = { x:-130, z:70, r:10, h:SLOPE_H }; // Phase3でY座標チェックに使用

function buildHijiyamaSlope() {
  const slopeM  = mkMat(0x505848); // 暗めのアスファルト
  const hillM   = mkMat(0x556644); // 山の地面
  const wallM   = mkMat(0x887766); // 擁壁
  const lineM2  = mkMat(0xDDDDAA);

  // ── 山体（比治山）────────────────────────────────────────
  // 丘のベース（半径13: 南部横断道西z=59.5と宮島沿岸z=87.5の隙間に収まる最大値）
  // 南端z=74-13=61 > 59.5 ✓  北端z=74+13=87 < 87.5 ✓
  const hill = mk(new THREE.CylinderGeometry(8, 13, SLOPE_H, 8), hillM, SLOPE_X, SLOPE_H/2-0.5, SLOPE_Z);
  scene.add(hill);
  // 丘の衝突判定（円形）: 半径13でOBS_CIRに登録
  OBS_CIR.push({ cx: SLOPE_X, cz: SLOPE_Z, r: 13 });
  const top = mk(new THREE.CylinderGeometry(5, 7, 1.5, 8), hillM, SLOPE_X, SLOPE_H+0.2, SLOPE_Z);
  scene.add(top);

  // ── 坂道（南側アプローチ） ────────────────────────────────
  // 坂面（傾斜プレーン）: z range=[76,86], 宮島沿岸z=87.5をクリア ✓
  const slopeAngle = Math.atan2(SLOPE_H, SLOPE_LEN);
  const slopeSurf = mk(new THREE.BoxGeometry(SLOPE_W, 0.4, SLOPE_LEN), slopeM,
                       SLOPE_X, SLOPE_H/2, SLOPE_Z + SLOPE_LEN/2 + 4);
  slopeSurf.rotation.x = slopeAngle;
  // Y位置を傾斜中心に合わせる
  slopeSurf.position.y = SLOPE_H/2 - 0.2;
  slopeSurf.position.z = SLOPE_Z + SLOPE_LEN/2 + 2;
  scene.add(slopeSurf);

  // 坂の支持壁（擁壁）z=85: 道路z=87.5より手前 ✓
  const wall = mk(new THREE.BoxGeometry(SLOPE_W, SLOPE_H, 1.5), wallM,
                  SLOPE_X, SLOPE_H/2, SLOPE_Z + SLOPE_LEN + 1);
  scene.add(wall);
  // 壁の衝突判定
  OBS_BOX.push({ cx: SLOPE_X, cz: SLOPE_Z + SLOPE_LEN + 1, hw: SLOPE_W/2, hd: 0.75 });

  // 坂の左右側壁（坂の幅方向を塞ぐ）
  OBS_BOX.push({ cx: SLOPE_X - SLOPE_W/2, cz: SLOPE_Z + SLOPE_LEN/2 + 2, hw: 0.5, hd: SLOPE_LEN/2 });
  OBS_BOX.push({ cx: SLOPE_X + SLOPE_W/2, cz: SLOPE_Z + SLOPE_LEN/2 + 2, hw: 0.5, hd: SLOPE_LEN/2 });

  // 坂の側壁（ガードレール）: 3区間のみ（z=77,81,85 → 全て<87.5 ✓）
  const grM = mkMat(0xAAAAAA);
  [-SLOPE_W/2-0.3, SLOPE_W/2+0.3].forEach(dx => {
    for (let i=0; i<3; i++) {
      const gz = SLOPE_Z + SLOPE_LEN/2 + i*4 - 2;
      const gy = (i/2)*SLOPE_H + 0.5;
      const gr = mk(new THREE.BoxGeometry(0.3, 0.6, 4), grM, SLOPE_X+dx, gy+0.3, gz);
      scene.add(gr);
    }
  });

  // 坂のセンターライン
  const cl = mk(new THREE.BoxGeometry(0.4, 0.1, SLOPE_LEN), lineM2,
                SLOPE_X, SLOPE_H/2+0.1, SLOPE_Z + SLOPE_LEN/2 + 2);
  cl.rotation.x = slopeAngle;
  cl.position.y = SLOPE_H/2 + 0.3;
  cl.position.z = SLOPE_Z + SLOPE_LEN/2 + 2;
  scene.add(cl);

  // 頂上の平坦路面
  const topRoad = mk(new THREE.CylinderGeometry(6, 6, 0.3, 8), slopeM, SLOPE_X, SLOPE_H+0.15, SLOPE_Z);
  scene.add(topRoad);

  // ── 木（頂上） ────────────────────────────────────────────
  const trunkM2 = mkMat(0x5C3317), leafM2 = mkMat(0x228B22);
  [[SLOPE_X-7, SLOPE_Z-5],[SLOPE_X+7, SLOPE_Z-5],[SLOPE_X-6, SLOPE_Z+5],[SLOPE_X+6, SLOPE_Z+5]].forEach(([tx,tz])=>{
    scene.add(mk(new THREE.CylinderGeometry(.3,.35,2.5,5), trunkM2, tx, SLOPE_H+1.25, tz));
    scene.add(mk(new THREE.CylinderGeometry(0,2.2,3.5,6), leafM2, tx, SLOPE_H+4.2, tz));
  });

  // ── ジャンプ台（坂の頂点から飛び出すランプ）z=82: 道路z=87.5より手前 ✓
  const rampM = mkMat(0x666655);
  const ramp = mk(new THREE.BoxGeometry(SLOPE_W, 0.5, 4), rampM, SLOPE_X, SLOPE_H+0.25, SLOPE_Z+8);
  ramp.rotation.x = -0.25; // 前上がり
  scene.add(ramp);
}

// ジャンプゾーン判定（gameLogicから呼び出し用 - Phase3フック）
function isOnSlope() {
  const dx = G.pos.x - JUMP_ZONE.x;
  const dz = G.pos.z - JUMP_ZONE.z;
  return Math.sqrt(dx*dx+dz*dz) < JUMP_ZONE.r;
}
function buildAtomDome() {
  const cx=-90, cz=-24;
  const brickM  = mkMat(0xCC8855);
  const skelM   = mkMat(0x886644);
  const winM    = mkMat(0x445566);
  const grp = new THREE.Group();

  // メイン建屋（横長3棟）
  grp.add(mk(new THREE.BoxGeometry(14,.1,8),  mkMat(0x997755), 0,.05,0)); // 基礎
  grp.add(mk(new THREE.BoxGeometry(14,5.5,8), brickM,  0,2.75,0));        // 本体
  // 窓スリット
  [-5,-2,2,5].forEach(ox => {
    grp.add(mk(new THREE.BoxGeometry(1.6,2.2,.2), winM, ox,2.8,-4.05));
    grp.add(mk(new THREE.BoxGeometry(1.6,2.2,.2), winM, ox,2.8, 4.05));
  });
  // ドーム台（円形ベース）
  grp.add(mk(new THREE.CylinderGeometry(3.2,3.2,.8,12), brickM, 0,5.5,0));
  // ドーム骨格（リング×3）
  [0,1.8,3.4].forEach((y,i) => {
    const r=3.2-i*.9;
    grp.add(mk(new THREE.CylinderGeometry(r+.1,r+.1,.18,12,1,true), skelM, 0,5.8+y,0));
  });
  // ドーム縦リブ（8本）
  for(let a=0;a<8;a++){
    const rad=a/8*Math.PI*2;
    const rx=Math.sin(rad)*2.8, rz=Math.cos(rad)*2.8;
    const rib=mk(new THREE.BoxGeometry(.22,3.8,.22), skelM, rx,7.4,rz);
    rib.rotation.x= Math.atan2(rz,2); // 傾け
    grp.add(rib);
  }
  // ドーム頂点（小球）
  grp.add(mk(new THREE.SphereGeometry(.55,8,6), skelM, 0,10.2,0));
  // 翼棟（左右）
  [-9.5,9.5].forEach(ox => {
    grp.add(mk(new THREE.BoxGeometry(5,4,7), brickM, ox,2,0));
    grp.add(mk(new THREE.BoxGeometry(5,.3,7.3), mkMat(darken(0xCC8855,.7)), ox,4.15,0));
    [-2,2].forEach(wox =>
      grp.add(mk(new THREE.BoxGeometry(1.4,1.8,.2), winM, ox+wox,2.5,-3.55)));
  });

  grp.position.set(cx,0,cz);
  scene.add(grp);
  OBS_BOX.push({cx, cz, hw:12, hd:5});
}

function buildHiroshimaCastle() {
  const cx=-14, cz=-100;

  const roofM  = mkMat(0x223322);

  // 1階（最大）
  grp.add(mk(new THREE.BoxGeometry(12,4,12),  wallM,  0,6.5,0));
  grp.add(mk(new THREE.BoxGeometry(13.5,.8,13.5),roofM,0,8.8,0)); // 1F屋根
  grp.add(mk(new THREE.BoxGeometry(14.5,.5,14.5),roofM,0,8.45,0));

  // 2階
  grp.add(mk(new THREE.BoxGeometry(9.5,3.5,9.5), wallM, 0,10,0));
  grp.add(mk(new THREE.BoxGeometry(11,.7,11),  roofM,  0,13.2,0));
  grp.add(mk(new THREE.BoxGeometry(12,.45,12), roofM,  0,12.9,0));

  // 3階
  grp.add(mk(new THREE.BoxGeometry(7,3,7),     wallM,  0,14.5,0));
  grp.add(mk(new THREE.BoxGeometry(8.5,.7,8.5),roofM,  0,17.3,0));
  grp.add(mk(new THREE.BoxGeometry(9.5,.45,9.5),roofM, 0,17.0,0));

  // 4階
  grp.add(mk(new THREE.BoxGeometry(5,2.8,5),   wallM,  0,18.5,0));
  grp.add(mk(new THREE.BoxGeometry(6.5,.65,6.5),roofM, 0,21.0,0));
  grp.add(mk(new THREE.BoxGeometry(7.5,.4,7.5), roofM, 0,20.75,0));

  // 天守閣（最上階）
  grp.add(mk(new THREE.BoxGeometry(3.5,2.5,3.5),wallM, 0,22.2,0));
  grp.add(mk(new THREE.CylinderGeometry(0,3.2,3.2,4), roofM, 0,25.5,0)); // 四角錐屋根
  grp.add(mk(new THREE.CylinderGeometry(.15,.15,1.8,4),mkMat(0xCCAA00), 0,27.3,0)); // 金の鯱

  // 窓（各階）
  [[0,7.2,6.1,1.5,1.8],[0,11,4.8,1.3,1.6],[0,15,3.5,1.1,1.4]].forEach(([ox,y,hz,wx,wh])=>{
    [-hz,hz].forEach(wz =>
      grp.add(mk(new THREE.BoxGeometry(wx,wh,.18), mkMat(0x445566), ox,y,wz)));
  });

  grp.position.set(cx,0,cz);
  scene.add(grp);
  OBS_BOX.push({cx, cz, hw:9, hd:9});
}

// ═══════════════════════════════════════════════════════════════

function buildMiyajimaTorii() {
  const cx=-175, cz=100;
  const toriiM = mkMat(0xCC3300);
  const grp = new THREE.Group();
  const span = 11;

  // 2本の柱
  [-span/2, span/2].forEach(ox => {
    grp.add(mk(new THREE.CylinderGeometry(.7,.8,16,10), toriiM, ox,8,0));
  });
  // 笠木（最上部の横木・反り）
  grp.add(mk(new THREE.BoxGeometry(span+4,.9,1.1),  toriiM,  0,16.2,0));
  grp.add(mk(new THREE.BoxGeometry(span+2,.65,.9),  toriiM,  0,16.6,0)); // 反り上部
  // 島木（2段目横木）
  grp.add(mk(new THREE.BoxGeometry(span+1,.75,1.0), toriiM,  0,14.2,0));
  // 貫（柱を貫く横木）
  grp.add(mk(new THREE.BoxGeometry(span+2,.55,.8),  toriiM,  0,12.4,0));
  // 額束（真ん中の飾り）
  grp.add(mk(new THREE.BoxGeometry(2.2,2.5,.4), mkMat(0xBB2200), 0,13.5,.1));
  grp.add(mk(new THREE.SphereGeometry(.8,8,6),  mkMat(0xDD4400), 0,15.0,.1));

const TRAM_ROUTES = [

const TRAM_NEAR_R  = 9;   // ニアミス判定半径
const TRAM_HIT_R   = 4.5; // 衝突判定半径
let tramLastNearMs = -9999999; // ニアミスクールダウン（ms）
let shakeTimer    = 0;    // camera shake duration
let lastHitTime   = -9999999; // collision cooldown（ms）

const trams = []; // [{mesh, route, t, dir}]

function buildTrams() {
  TRAM_ROUTES.forEach((route, ri) => {
    const grp = new THREE.Group();

    // 車体
    const bodyM  = mkMat(0x1E7A1E); // 広電グリーン
    const whiteM = mkMat(0xEEEEEE);
    const winM   = mkMat(0x334455);
    const wheelM = mkMat(0x222222);

    // メイン車体
    grp.add(mk(new THREE.BoxGeometry(3.2, 2.4, 9.5), bodyM,   0, 1.5, 0));
    // 白帯（上下2本）
    grp.add(mk(new THREE.BoxGeometry(3.22,.35, 9.52), whiteM, 0, 2.55, 0));
    grp.add(mk(new THREE.BoxGeometry(3.22,.25, 9.52), whiteM, 0, 0.72, 0));
    // 屋根
    grp.add(mk(new THREE.BoxGeometry(3.0, .35, 9.6),  mkMat(0x156015), 0, 2.78, 0));
    // 前後窓
    [-4.76, 4.76].forEach(oz => {
      grp.add(mk(new THREE.BoxGeometry(2.4, 1.1, .15), winM, 0, 1.8, oz));
    });
    // 側面窓（3枚×両側）
    [-3,-3].forEach(() => {}); // dummy
    [-2.8, 0, 2.8].forEach(oz2 => {
      grp.add(mk(new THREE.BoxGeometry(.15, .9, 2.0), winM,  1.62, 1.75, oz2));
      grp.add(mk(new THREE.BoxGeometry(.15, .9, 2.0), winM, -1.62, 1.75, oz2));
    });
    // 行先表示板（前面）
    grp.add(mk(new THREE.BoxGeometry(1.4, .45, .18), mkMat(0xFFEE00), 0, 2.55, -4.78));
    // 台車（前後）
    [-3, 3].forEach(oz => {
      grp.add(mk(new THREE.BoxGeometry(3.4, .4, 2.8), mkMat(0x444444), 0, .2, oz));
      // 車輪×4
      [-1.5, 1.5].forEach(ox => {
        [-0.9, 0.9].forEach(oz2 => {
          const w = new THREE.Mesh(
            new THREE.CylinderGeometry(.45,.45,.32,10),
            new THREE.MeshLambertMaterial({color:0x222222})
          );
          w.rotation.z = Math.PI/2;
          w.position.set(ox, .45, oz+oz2);
          grp.add(w);
        });
      });
    });
    // パンタグラフ（屋根上）
    grp.add(mk(new THREE.BoxGeometry(.12, 1.0, .12), mkMat(0x888888), 0, 3.4, -1.5));
    grp.add(mk(new THREE.BoxGeometry(2.2, .12, .12), mkMat(0x888888), 0, 3.9, -1.5));

    // 初期位置を設定
    const len = Math.hypot(route.x2-route.x1, route.z2-route.z1);
    const dx = (route.x2-route.x1)/len, dz = (route.z2-route.z1)/len;
    const t0 = route.t;
    const ix = route.x1 + dx*len*t0;
    const iz = route.z1 + dz*len*t0;
    grp.position.set(ix, 0, iz);
    // 進行方向に向ける（-Z方向が前）
    grp.rotation.y = Math.atan2(-dx, -dz);
    scene.add(grp);

    trams.push({ mesh:grp, route, t:t0, dir:1 });
  });
}

function updateTrams(dt) {
  if (G.phase !== 'PLAY') return;
  trams.forEach(tr => {
    const r   = tr.route;
    const len = Math.hypot(r.x2-r.x1, r.z2-r.z1);
    const dx  = (r.x2-r.x1)/len, dz = (r.z2-r.z1)/len;

    // 位置を進める
    tr.t += tr.dir * r.spd * dt / len;

    // 端点で折返し
    if (tr.t >= 1) { tr.t = 1; tr.dir = -1; }
    if (tr.t <= 0) { tr.t = 0; tr.dir =  1; }

    const tx = r.x1 + dx*len*tr.t;
    const tz = r.z1 + dz*len*tr.t;
    tr.mesh.position.set(tx, 0, tz);

    // 向き（進行方向）
    const fdx = dx * tr.dir, fdz = dz * tr.dir;
    tr.mesh.rotation.y = Math.atan2(-fdx, -fdz);

    // ── プレイヤーとの衝突 / ニアミス ─────────────────────
    const dist = Math.hypot(G.pos.x - tx, G.pos.z - tz);

    if (dist < TRAM_HIT_R) {
      // 衝突：スピンアウト
      const now = performance.now();
      if (now - lastHitTime > 500) {
        lastHitTime = now;
        G.spd *= -0.35;
        applyCollisionPenalty('広電に衝突！', 0.45);
      }
    } else if (dist < TRAM_NEAR_R && G.phase === 'PLAY') {
      const now = performance.now();
      if (now - tramLastNearMs > 2000) {
        tramLastNearMs = now;
        addTip('near');
      }
    }
  });
}

// 車体色パレット
const NPC_COLORS = [
  0xCC3333, 0x3355CC, 0x228833, 0xCCAA22,
  0x888888, 0xCC6622, 0x44AACC, 0xCC4488,
];

const NPC_HIT_R  = 4.0;
const NPC_NEAR_R = 7.0;
let npcLastNearMs = -9999999;
const npcs = [];

function buildNpcVehicle(route, idx) {
  const grp  = new THREE.Group();
  const col  = NPC_COLORS[idx % NPC_COLORS.length];
  const bodyM = mkMat(col);
  const dkM   = mkMat(0x1A2A38);
  const gmM   = mkMat(0x777777);
  const hlM   = mkMat(0xFFFFBB);
  const tlM   = mkMat(0xFF2200);

  // 車種をindexで分ける（0-2:セダン, 3-5:ワゴン, 6-7:軽）
  const type = idx % 3; // 0:セダン 1:ワゴン 2:軽
  const bw = type===2 ? 1.7 : 2.0;
  const bh = type===1 ? 0.75: 0.65;
  const bl = type===2 ? 3.2 : type===1 ? 4.4 : 3.8;
  const ch = type===1 ? 0.7 : 0.62;
  const cl = type===1 ? 2.8 : 2.0;

  // ボディ
  grp.add(mk(new THREE.BoxGeometry(bw, bh, bl), bodyM, 0, .55, 0));
  // キャビン
  grp.add(mk(new THREE.BoxGeometry(bw*.88, ch, cl), bodyM, 0, bh+ch/2+.05, type===1?-.2:.1));
  // 前後窓
  const ww = bw*.82;
  grp.add(mk(new THREE.BoxGeometry(ww,.42,.1), dkM, 0, bh+.22, -(cl/2+.05)));
  grp.add(mk(new THREE.BoxGeometry(ww,.38,.1), dkM, 0, bh+.18,   cl/2+.05));
  // バンパー
  grp.add(mk(new THREE.BoxGeometry(bw*.88,.28,.16), gmM, 0,.28,-(bl/2+.08)));
  grp.add(mk(new THREE.BoxGeometry(bw*.88,.28,.16), gmM, 0,.28,  bl/2+.08));
  // ライト
  [-.55,.55].forEach(ox => {
    grp.add(mk(new THREE.BoxGeometry(.38,.22,.12), hlM,  ox*.9*bw, .55,-(bl/2+.07)));
    grp.add(mk(new THREE.BoxGeometry(.38,.18,.12), tlM,  ox*.9*bw, .55,  bl/2+.07));
  });
  // タイヤ
  const wkGeo = new THREE.CylinderGeometry(.38,.38,.3,8);
  const wkM   = mkMat(0x1A1A1A);
  [[-bw/2-.16,.38,-(bl/2-.7)],[bw/2+.16,.38,-(bl/2-.7)],
   [-bw/2-.16,.38,  bl/2-.7 ],[bw/2+.16,.38,  bl/2-.7 ]].forEach(([wx,wy,wz])=>{
    const wm = new THREE.Mesh(wkGeo, wkM);
    wm.rotation.z = Math.PI/2;
    wm.position.set(wx,wy,wz);
    grp.add(wm);
  });

  // 初期位置
  const r = route;
  const len = Math.hypot(r.x2-r.x1, r.z2-r.z1);
  const dx = (r.x2-r.x1)/len, dz = (r.z2-r.z1)/len;
  // 車線オフセット（道路の横方向）
  const nx = -dz, nz = dx;
  const ix = r.x1 + dx*len*r.t + nx*r.lo;
  const iz = r.z1 + dz*len*r.t + nz*r.lo;
  grp.position.set(ix, 0, iz);
  grp.rotation.y = Math.atan2(-dx, -dz);
  scene.add(grp);

  npcs.push({ mesh:grp, route:r, t:r.t });
}

function buildNpcs() {
  NPC_ROUTES.forEach((route, i) => buildNpcVehicle(route, i));
}

function updateNpcs(dt) {
  if (G.phase !== 'PLAY') return;
  npcs.forEach(npc => {
    const r   = npc.route;
    const len = Math.hypot(r.x2-r.x1, r.z2-r.z1);
    const dx  = (r.x2-r.x1)/len, dz = (r.z2-r.z1)/len;
    const nx  = -dz, nz = dx;

    // 一方向ループ（端点に達したら始点にワープ）
    npc.t += r.spd * dt / len;
    if (npc.t >= 1) npc.t -= 1;

    const tx = r.x1 + dx*len*npc.t + nx*r.lo;
    const tz = r.z1 + dz*len*npc.t + nz*r.lo;
    npc.mesh.position.set(tx, 0, tz);

    // 向き（常に進行方向）
    npc.mesh.rotation.y = Math.atan2(-dx, -dz);

    // タイヤ回転
    const wr = r.spd * .04;
    npc.mesh.children.forEach((c,i) => { if (i >= 8) c.rotation.x += wr; });

    // 衝突判定
    const dist = Math.hypot(G.pos.x - tx, G.pos.z - tz);
    if (dist < NPC_HIT_R) {
      const now = performance.now();
      if (now - lastHitTime > 500) {
        lastHitTime = now;
        G.spd *= -0.3;
        applyCollisionPenalty('車に衝突！', 0.32);
      }
    } else if (dist < NPC_NEAR_R) {
      const now = performance.now();
      if (now - npcLastNearMs > 1500) {
        npcLastNearMs = now;
        addTip('near');
      }
    }
  });
}

  const dg = new THREE.Group();
  const redM=mkMat(0xFF3300), red2M=mkMat(0xFF1100);

function mkRing(r, col) {
  const m = new THREE.Mesh(
    new THREE.RingGeometry(r-.25,r,32),
    new THREE.MeshBasicMaterial({color:col, side:THREE.DoubleSide})
  );
  m.rotation.x = -Math.PI/2; m.position.y = .05;
  return m;
}

const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
addEventListener('keyup', e => { keys[e.code] = false; });

function setupTouch() {
  const MAP = { 'tb-l':'lT','tb-r':'rT','tb-gas':'gasT','tb-dash':'dashT','tb-rev':'revT' };
  Object.entries(MAP).forEach(([id,key]) => {
    const el = document.getElementById(id);
    const on=()=>{ G.inp[key]=true; el.classList.add('on'); };
    const off=()=>{ G.inp[key]=false; el.classList.remove('on'); };
    el.addEventListener('touchstart', e=>{e.preventDefault();on();},{passive:false});
    el.addEventListener('touchend',   e=>{e.preventDefault();off();});
    el.addEventListener('touchcancel',off);
    el.addEventListener('mousedown',  on);
    el.addEventListener('mouseup',    off);
    el.addEventListener('mouseleave', off);
  });
}

// ═══════════════════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════════════════
function resolveCollisions(newX, newZ) {
  let rx = newX, rz = newZ;
  let hit = false;

  // ── AABB buildings ──────────────────────────────────────────
  for (const b of OBS_BOX) {
    // closest point on box to car center
    const cx = Math.max(b.cx - b.hw, Math.min(b.cx + b.hw, rx));
    const cz = Math.max(b.cz - b.hd, Math.min(b.cz + b.hd, rz));
    const dx = rx - cx, dz = rz - cz;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < CAR_R && dist > 0.001) {
      // push car out along the collision normal
      const nx = dx/dist, nz = dz/dist;
      const pen = CAR_R - dist;
      rx += nx * pen;
      rz += nz * pen;
      hit = true;
    }
  }

  // ── Circle trees ────────────────────────────────────────────
  for (const t of OBS_CIR) {
    const dx = rx - t.cx, dz = rz - t.cz;
    const dist = Math.sqrt(dx*dx + dz*dz);
    const minD = CAR_R + t.r;
    if (dist < minD && dist > 0.001) {
      const nx = dx/dist, nz = dz/dist;
      rx += nx * (minD - dist);
      rz += nz * (minD - dist);
      hit = true;
    }
  }

  return { rx, rz, hit };
}

// ═══════════════════════════════════════════════════════════════
//  PHYSICS (Phase 4: char stats / drift / jump)
// ═══════════════════════════════════════════════════════════════
function physics(dt) {
  const ch  = CHARS[selectedChar];
  const veh = VEHICLES[selectedVehicle];
  const effAccel   = ACCEL    * ch.accel    * veh.accel;
  const effMaxSpd  = MAX_SPD  * ch.maxSpd   * veh.maxSpd;
  const effDashSpd = DASH_SPD * ch.maxSpd   * veh.maxSpd;
  const effDur     = Math.min(2.0, ch.durability * veh.durability);

  const i=G.inp;
  const gas=i.gasK||i.gasT, brk=i.brkK||i.brkT;
  const rev=i.revK||i.revT;
  const lft=i.lK||i.lT, rgt=i.rK||i.rT, dash=i.dashK||i.dashT;
  const mxs = dash ? effDashSpd : effMaxSpd;
  if (gas) {
    G.spd = G.spd<0 ? G.spd+BRAKE_F*dt : Math.min(G.spd+(dash?effAccel*2.2:effAccel)*dt, mxs);
  } else if (rev) {
    G.spd = G.spd>0 ? G.spd-BRAKE_F*dt : Math.max(G.spd-effAccel*.55*dt,-9);
  } else if (brk) {
    const f=BRAKE_F*dt;
    G.spd = Math.abs(G.spd)<f ? 0 : G.spd-Math.sign(G.spd)*f;
  } else {
    const f=FRICTION*dt;
    G.spd = Math.abs(G.spd)<f ? 0 : G.spd-Math.sign(G.spd)*f;
  }

  const hdgPrev = G.hdg;
  if (Math.abs(G.spd)>.4) {
    const sr=Math.min(Math.abs(G.spd)/MAX_SPD,1);
    const tr=TURN_SLOW+(TURN_FAST-TURN_SLOW)*sr;
    const ddir=Math.sign(G.spd);
    if (lft) G.hdg+=tr*dt*ddir;
    if (rgt) G.hdg-=tr*dt*ddir;
  }

  // ── ドリフト判定 ──────────────────────────────────────
  const hdgRate = Math.abs(G.hdg - hdgPrev) / dt;
  G.driftCool  = Math.max(0, G.driftCool - dt);
  G.driftTimer = (hdgRate > 1.1 && Math.abs(G.spd) > effMaxSpd * 0.45)
    ? G.driftTimer + dt : 0;
  if (G.driftTimer > 0.28 && G.driftCool <= 0) {
    addTip('drift'); G.driftTimer = 0; G.driftCool = 1.4;
  }

  const prev = G.pos.clone();
  const sh=Math.sin(G.hdg), cv=Math.cos(G.hdg);
  let nx = G.pos.x - sh*G.spd*dt;
  let nz = G.pos.z - cv*G.spd*dt;
  nx = Math.max(MAP_XMIN, Math.min(MAP_XMAX, nx));
  nz = Math.max(MAP_ZMIN, Math.min(MAP_ZMAX, nz));

  // Collision resolve
  const { rx, rz, hit } = resolveCollisions(nx, nz);
  G.pos.x = rx;
  G.pos.z = rz;

  // ── ジャンプ物理 ──────────────────────────────────────
  G.jumpCool = Math.max(0, G.jumpCool - dt);
  if (!G.inAir && G.jumpCool <= 0 && isOnSlope() && G.spd > effMaxSpd * 0.65) {
    G.inAir   = true;
    G.jumpVel = 9.5 + G.spd * 0.18;
    G.jumpCool = 3.0;
    addTip('jump');
  }
  if (G.inAir) {
    G.jumpVel -= 18 * dt;
    G.pos.y    = Math.max(0.5, G.pos.y + G.jumpVel * dt);
    if (G.pos.y <= 0.5 && G.jumpVel < 0) {
      G.inAir = false; G.jumpVel = 0; G.pos.y = 0.5;
    }
  } else {
    G.pos.y = 0.5;
  }

  if (hit) {
    const now = performance.now();
    if (now - lastHitTime > 400) {
      lastHitTime = now;
      const impact = Math.abs(G.spd);
      G.spd *= -0.25 * effDur;
      if (impact > 3) {
        applyCollisionPenalty('衝突！', 0.28 / effDur);
      }
    } else {
      G.spd = 0;
    }
  }

  if (G.carState==='RIDE') G.tripDist += prev.distanceTo(G.pos)*GAME_SCALE;
}

// ═══════════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════════
function updateCam(dt) {
  const sh=Math.sin(G.hdg), ch=Math.cos(G.hdg);
  const tgt = new THREE.Vector3(G.pos.x+sh*11, G.pos.y+5.5, G.pos.z+ch*11);
  camPos.lerp(tgt, .1);
  cam.position.copy(camPos);

  // Camera shake on collision
  let sx=0, sy=0;
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    const mag = shakeTimer * 1.2;
    sx = (Math.random()-.5)*mag;
    sy = (Math.random()-.5)*mag*0.5;
  }
  cam.lookAt(G.pos.x+sx, G.pos.y+1.6+sy, G.pos.z);
}

// ═══════════════════════════════════════════════════════════════
//  FARE / RANK
// ═══════════════════════════════════════════════════════════════
function calcFare(distM) {
  // 広島空港定額
  if (distM > 40000) return 17000;
  return 700 + Math.ceil(Math.max(0,distM-1150)/300)*100;
}
function getDistReal(gu) { return gu*GAME_SCALE; }
function getRank(e) {
  return e>=30000?'S':e>=20000?'A':e>=12000?'B':e>=6000?'C':e>=3000?'D':'E';
}

//  COLLISION PENALTY (Phase 4)  – チップマイナス・コンボリセット
// ═══════════════════════════════════════════════════════════════
function applyCollisionPenalty(label, shakeDur) {
  sndCollision();
  const penalty = 200; // チップから200円減算（100円単位）
  if (G.carState === 'RIDE') {
    G.tripTips = Math.max(0, G.tripTips - penalty);
    showEval(`${label}  −¥${penalty}`, '#FF5555', 1.4);
  } else {
    showEval(label, '#FF5555', 1.2);
  }
  shakeTimer  = shakeDur;
  G.combo     = 1.0;
  G.consec    = 0;
}

// ═══════════════════════════════════════════════════════════════
//  TIP SYSTEM (Phase 4)
// ═══════════════════════════════════════════════════════════════
const TIP_BASE = { drift:100, near:100, jump:200, hop:100, dash:100 };
const TIP_LABEL = {
  drift: ['神風ドリフト！','ドリフト！'],
  near:  ['ニアミス！'],
  jump:  ['神風ジャンプ！！'],
  hop:   ['神風ホップ！'],
  dash:  ['神風ダッシュ！'],
};
function addTip(type) {
  if (G.carState !== 'RIDE') return;
  const base  = TIP_BASE[type] || 100;
  const spdBonus = Math.floor(Math.abs(G.spd) / 4) * 10; // スピードボーナスも10円単位
  const raw      = base + spdBonus;
  const amount   = Math.round(raw / 100) * 100; // 100円単位に丸める
  G.tripTips += amount;
  G.combo = Math.min(5.0, parseFloat((G.combo + 0.35).toFixed(1)));
  G.maxCombo = Math.max(G.maxCombo||1.0, G.combo);
  // 効果音
  if (type==='near')  sndNearMiss();
  else if (type==='drift') sndDrift();
  else if (type==='jump')  sndJump();
  else if (type==='dash')  sndDash();
  const labels = TIP_LABEL[type] || ['テクニック！'];
  const lbl    = labels[Math.floor(Math.random()*labels.length)];
  showEval(`${lbl}  +¥${amount.toLocaleString()}`, '#FFD060', 1.1);
}

// ═══════════════════════════════════════════════════════════════
//  GAME LOGIC (Phase 4)
// ═══════════════════════════════════════════════════════════════
let onHighwaySince = -1;

function gameLogic(dt) {
  if (G.phase!=='PLAY') return;
  G.timer-=dt;
  if (G.timer<=0) { G.timer=0; endGame(); return; }

  // Highway detection（関数スコープで宣言し後続ブロックからも参照可）
  const isOnHwy = G.pos.x>95 && G.pos.z<-10;
  if (isOnHwy && onHighwaySince<0) {
    onHighwaySince = G.timer;
    showEval('高速道路', '#AAFFFF', 1.5);
  } else if (!isOnHwy) { onHighwaySince = -1; }

  // Area label
  document.getElementById('area-label').textContent = getAreaName();

  // Proximity rings
  let nearestPax=null, nearestD=999;
  if (G.carState==='SEEK') {
    G.pax.forEach(p => {
      if (!p.active) return;
      const d=G.pos.distanceTo(p.pos);
      if (d<nearestD) { nearestD=d; nearestPax=p; }
    });
    if (nearestPax && nearestD<PICKUP_R*2.5) {
      pickupRing.position.set(nearestPax.pos.x,.05,nearestPax.pos.z);
      pickupRing.visible=true;
    } else { pickupRing.visible=false; }
    arriveRing.visible=false;
  } else if (G.carState==='RIDE') {
    pickupRing.visible=false;
    const dTD=G.pos.distanceTo(G.dest.pos);
    if (dTD<ARRIVE_R*2.5) {
      arriveRing.position.set(G.dest.pos.x,.05,G.dest.pos.z);
      arriveRing.visible=true;
    } else { arriveRing.visible=false; }
  } else {
    pickupRing.visible=false; arriveRing.visible=false;
  }

  // Passenger pickup
  if (G.carState==='SEEK') {
    G.pax.forEach(p => {
      if (!p.active) return;
      if (G.pos.distanceTo(p.pos)<PICKUP_R && Math.abs(G.spd)<10) {
        p.active=false; p.mesh.visible=false;
        G.carState='RIDE'; G.tripDist=0; G.tripTips=0;
        // 運賃メーター初期化
        const isAirportDest = G.dest.name.includes('空港');
        G.meterFare     = isAirportDest ? 17000 : 700;
        G.meterNextTick = isAirportDest ? Infinity : 1150;
        G.meterFlash    = 0;
        const d2d=p.pos.distanceTo(G.dest.pos);
        const timerBonus = d2d>90?30 : d2d>45?22 : 15;
        G.timer += timerBonus;
        // 個別制限時間（距離に応じて45〜90秒）
        G.paxTimerMax = d2d>90?90 : d2d>45?65 : 45;
        G.paxTimer    = G.paxTimerMax;
        G.dest.mesh.visible=true;
        document.getElementById('meter').style.display='flex';
        document.getElementById('hd').style.display='';
        document.getElementById('pax-bar').style.display='';
        document.getElementById('dn').textContent=G.dest.name;
        showEval('乗車！','#00FF88',1.8);
        sndPickup();
        const isAirport = G.dest.name.includes('空港');
        showStatus(`「${getBoardLine(G.dest.name)}」\n➤ ${G.dest.name}${isAirport?'\n🟣 高速道路を利用してください！':''}`);
        paxRespawnT=8;
      }
    });
  }

  // ── 個別制限タイマー ─────────────────────────────────
  if (G.carState==='RIDE') {
    G.paxTimer -= dt;
    if (G.paxTimer <= 0) {
      // 時間切れ → 途中降車・運賃ゼロ
      G.paxTimer = 0;
      showEval('時間切れ！運賃ゼロ…', '#FF4444', 2.5);
      sndTimeout();
      showStatus('「もうええわ！降りるけぇ！」');
      G.carState='WAIT'; G.tripTips=0; G.combo=1.0; G.consec=0;
      G.dest.mesh.visible=false;
      document.getElementById('meter').style.display='none';
      document.getElementById('hd').style.display='none';
      document.getElementById('pax-bar').style.display='none';
      destI=(destI+1)%DEST_POOL.length;
      G.dest.pos.copy(DEST_POOL[destI].pos);
      G.dest.name=DEST_POOL[destI].name;
      G.dest.mesh.position.copy(DEST_POOL[destI].pos);
      setTimeout(()=>{ G.carState='SEEK'; }, 2400);
    }
  }

  // Passenger respawn
  if (paxRespawnT>0) {
    paxRespawnT-=dt;
    if (paxRespawnT<=0) {
      const di=G.pax.findIndex(p=>!p.active);
      if (di>=0) {
        const src=EXTRA_PAX[extraPaxI%EXTRA_PAX.length]; extraPaxI++;
        G.pax[di].pos.copy(src);
        G.pax[di].mesh.position.copy(src);
        G.pax[di].active=true; G.pax[di].mesh.visible=true;
        updatePaxColor(G.pax[di]);
      }
    }
  }

  // ── 運賃メーター更新 ──────────────────────────────────
  if (G.carState==='RIDE') {
    G.meterFlash = Math.max(0, G.meterFlash - dt);
    // 走行距離が次のティック閾値を超えたらカウントアップ
    while (G.tripDist >= G.meterNextTick && G.meterNextTick !== Infinity) {
      G.meterFare    += 100;
      G.meterNextTick += 300;
      G.meterFlash    = 0.25; // 0.25秒フラッシュ
      sndMeterTick();
    }
  }

  // ── 到着判定 ─────────────────────────────────────────
  if (G.carState==='RIDE') {
    const distToDest=G.pos.distanceTo(G.dest.pos);
    const meterEl = document.getElementById('meter-value');
    meterEl.textContent = '¥' + G.meterFare.toLocaleString();
    if (G.meterFlash > 0) { meterEl.classList.add('flash'); } else { meterEl.classList.remove('flash'); }
    document.getElementById('dd').textContent=
      distToDest>999 ? Math.floor(distToDest/10)+'km' : Math.floor(getDistReal(distToDest))+'m';

    if (G.spd>MAX_SPD*.7 && G.etTimer<=0 && Math.random()<.003)
      showEval(isOnHwy&&Math.random()<.4?rand(HWY_LINES):rand(DRIVE_LINES), '#AADDFF', 1.4);

    if (distToDest<ARRIVE_R && Math.abs(G.spd)<ARRIVE_MAX_SPD) {
      const f   = G.meterFare;  // メーター値を運賃として使用
      const tips = Math.floor(G.tripTips * G.combo);
      const kmh  = G.spd*3.6;
      let speedBonus=0, etxt='GOOD', ecol='#ffffff';
      if      (kmh>55){ etxt='KAMIKAZE!'; ecol='#FFD700'; speedBonus=500; G.timer+=5; sndArrive(true); }
      else if (kmh>22){ etxt='GREAT!';    ecol='#FFFF44'; speedBonus=200; G.timer+=2; sndArrive(false); }
      else { sndGood(); }
      // 連続送迎ボーナス
      G.consec++; G.maxConsec=Math.max(G.maxConsec,G.consec);
      const consecBonus = G.consec>=3 ? G.consec*200 : 0;
      const total = f + tips + speedBonus + consecBonus;
      G.earn += total; G.deliveries++;
      const breakdownParts = [`基本¥${f.toLocaleString()}`];
      if (tips>0)        breakdownParts.push(`チップ¥${tips.toLocaleString()}`);
      if (speedBonus>0)  breakdownParts.push(`スピードボーナス¥${speedBonus}`);
      if (consecBonus>0) breakdownParts.push(`連続×${G.consec}ボーナス¥${consecBonus}`);
      showEval(etxt, ecol, 2.8);
      showStatus(`${rand(ARRIVE_LINES)}\n${breakdownParts.join('  ')}\n合計+¥${total.toLocaleString()}`);
      G.combo = Math.min(5.0, parseFloat((G.combo + 0.1).toFixed(1)));
      G.tripTips=0;
      G.carState='WAIT';
      G.dest.mesh.visible=false;
      pickupRing.visible=false; arriveRing.visible=false;
      document.getElementById('meter').style.display='none';
      document.getElementById('hd').style.display='none';
      document.getElementById('pax-bar').style.display='none';
      destI=(destI+1)%DEST_POOL.length;
      G.dest.pos.copy(DEST_POOL[destI].pos);
      G.dest.name=DEST_POOL[destI].name;
      G.dest.mesh.position.copy(DEST_POOL[destI].pos);
      // 次の乗客の色更新
      G.pax.forEach(p=>{ if(p.active) updatePaxColor(p); });
      setTimeout(()=>{ G.carState='SEEK'; }, 2400);
    }
  }

  // 神風ダッシュでチップ（乗車中のみ・クールダウン1.8秒）
  G.dashCool = Math.max(0, G.dashCool - dt);
  if ((G.inp.dashK||G.inp.dashT) && G.spd>8 && G.dashCool<=0) {
    G.dashCool = 1.8;
    if (G.carState==='RIDE') addTip('dash');
    else showEval('神風ダッシュ！','#FF8800',.7);
  }

  G.etTimer-=dt; if(G.etTimer<=0) document.getElementById('et').style.opacity='0';
  G.stTimer-=dt; if(G.stTimer<=0) document.getElementById('st').style.opacity='0';
}

// ═══════════════════════════════════════════════════════════════
//  MINIMAP – player-centred, road network aware
// ═══════════════════════════════════════════════════════════════
const mmCtx = document.getElementById('mm').getContext('2d');
const MM_W=110, MM_H=110, MM_R=130; // show ±130 units from player

function updateMM() {
  const sc = MM_W/(2*MM_R);
  const px0=MM_W/2, py0=MM_H/2;
  mmCtx.clearRect(0,0,MM_W,MM_H);

  // 円形クリップ（ヘディングアップで角が空くのを隠す）
  mmCtx.save();
  mmCtx.beginPath(); mmCtx.arc(px0,py0,MM_W/2-1,0,Math.PI*2);
  mmCtx.clip();

  mmCtx.fillStyle='#0a1218'; mmCtx.fillRect(0,0,MM_W,MM_H);

  // ── ヘディングアップ：自車進行方向が上になるよう全体を回転 ──
  mmCtx.save();
  mmCtx.translate(px0, py0);
  mmCtx.rotate(G.hdg);          // 自車の向きと逆回転
  mmCtx.translate(-px0, -py0);

  // Roads
  ROAD_SEGS.forEach(s => {
    const x1=px0+(s.x1-G.pos.x)*sc, y1=py0+(s.z1-G.pos.z)*sc;
    const x2=px0+(s.x2-G.pos.x)*sc, y2=py0+(s.z2-G.pos.z)*sc;
    mmCtx.strokeStyle = s.isHwy ? '#888' : '#404040';
    mmCtx.lineWidth = Math.max(1, s.w*sc*0.55);
    mmCtx.lineCap = 'round';
    mmCtx.beginPath(); mmCtx.moveTo(x1,y1); mmCtx.lineTo(x2,y2); mmCtx.stroke();
  });

  // Passengers
  G.pax.forEach(p => {
    if (!p.active) return;
    const x=px0+(p.pos.x-G.pos.x)*sc, y=py0+(p.pos.z-G.pos.z)*sc;
    if (x<0||x>MM_W||y<0||y>MM_H) return;
    mmCtx.fillStyle='#00FF88';
    mmCtx.beginPath(); mmCtx.arc(x,y,3,0,Math.PI*2); mmCtx.fill();
  });

  // Destination
  if (G.carState==='RIDE'||G.carState==='WAIT') {
    const dx=G.dest.pos.x-G.pos.x, dz=G.dest.pos.z-G.pos.z;
    const x=px0+dx*sc, y=py0+dz*sc;
    if (x>=0&&x<=MM_W&&y>=0&&y<=MM_H) {
      mmCtx.fillStyle='#FF4400';
      mmCtx.beginPath(); mmCtx.arc(x,y,4,0,Math.PI*2); mmCtx.fill();
    } else {
      // Off-map: edge arrow（ワールド座標系での方向）
      const ang=Math.atan2(dx,dz);
      const er=42;
      const ex=px0+Math.sin(ang)*er, ey=py0+Math.cos(ang)*er;
      mmCtx.fillStyle='#FF4400';
      mmCtx.save(); mmCtx.translate(ex,ey); mmCtx.rotate(ang);
      mmCtx.beginPath(); mmCtx.moveTo(0,-6); mmCtx.lineTo(4,4); mmCtx.lineTo(-4,4);
      mmCtx.closePath(); mmCtx.fill();
      mmCtx.restore();
    }
  }

  mmCtx.restore(); // ヘディングアップ回転を戻す

  // Player（常に中央・常に上向き固定）
  mmCtx.fillStyle='#FFD700';
  mmCtx.save(); mmCtx.translate(px0,py0);
  mmCtx.beginPath(); mmCtx.moveTo(0,-6); mmCtx.lineTo(4,5); mmCtx.lineTo(-4,5);
  mmCtx.closePath(); mmCtx.fill(); mmCtx.restore();

  // 円形ボーダー
  mmCtx.restore(); // clip解除
  mmCtx.strokeStyle='rgba(255,200,0,.6)'; mmCtx.lineWidth=1.5;
  mmCtx.beginPath(); mmCtx.arc(px0,py0,MM_W/2-1,0,Math.PI*2); mmCtx.stroke();
}

// ═══════════════════════════════════════════════════════════════
//  PASSENGER COLOR (Phase 5 – 距離で色分け)
// ═══════════════════════════════════════════════════════════════
function updatePaxColor(p) {
  // 次の目的地との距離で色分け: 近=緑 中=黄 遠=赤 超遠=紫
  const d = p.pos.distanceTo(G.dest.pos);
  let col;
  if      (d < 45)  col = 0x00DD44;  // 近（緑）
  else if (d < 100) col = 0xDDAA00;  // 中（黄）
  else if (d < 200) col = 0xFF3300;  // 遠（赤）
  else              col = 0xAA44FF;  // 超遠・空港（紫）
  // マーカーの色マテリアルを更新（子要素0=ディスク, 1=ポール, 2=ボール）
  if (p.mesh) {
    [0,1,2].forEach(ci => {
      const child = p.mesh.children[ci];
      if (child && child.material) child.material.color.setHex(col);
    });
  }
  p.color = col;
}

function startGame() {
  document.getElementById('charsel').style.display='none';
  document.getElementById('vehiclesel').style.display='none';
  document.getElementById('result').style.display='none';
  G.phase='PLAY'; G.carState='SEEK';
  engineStarted = false;
  startEngine();
  G.timer=75; G.earn=0; G.deliveries=0;
  G.spd=0; G.hdg=0; G.tripDist=0;
  G.etTimer=0; G.stTimer=0;
  // Phase 4 state reset
  G.combo=1.0; G.tripTips=0;
  G.paxTimer=0; G.paxTimerMax=60;
  G.consec=0; G.maxConsec=0; G.maxCombo=1.0;
  G.driftTimer=0; G.driftCool=0; G.dashCool=0;
  G.meterFare=700; G.meterNextTick=1150; G.meterFlash=0;
  G.inAir=false; G.jumpVel=0; G.jumpCool=0;
  G.pos.set(62, .5, 42);   // 駅前アプローチ終点・比治山エリア入口
  camPos.set(62, 8, 55);
  paxRespawnT=-1; extraPaxI=0; destI=0; onHighwaySince=-1;
  shakeTimer=0; lastHitTime=-9999999; tramLastNearMs=-9999999; npcLastNearMs=-9999999;
  // 路面電車リセット
  trams.forEach((tr)=>{
    const r=tr.route, len=Math.hypot(r.x2-r.x1,r.z2-r.z1);
    const dx=(r.x2-r.x1)/len, dz=(r.z2-r.z1)/len;
    tr.t=r.t; tr.dir=1;
    tr.mesh.position.set(r.x1+dx*len*r.t, 0, r.z1+dz*len*r.t);
    tr.mesh.rotation.y=Math.atan2(-dx,-dz);
  });
  // NPC車両リセット
  npcs.forEach(npc=>{
    const r=npc.route, len=Math.hypot(r.x2-r.x1,r.z2-r.z1);
    const dx=(r.x2-r.x1)/len, dz=(r.z2-r.z1)/len;
    const nx=-dz, nz=dx;
    npc.t=r.t;
    npc.mesh.position.set(r.x1+dx*len*r.t+nx*r.lo, 0, r.z1+dz*len*r.t+nz*r.lo);
    npc.mesh.rotation.y=Math.atan2(-dx,-dz);
  });
  G.dest.pos.copy(DEST_POOL[0].pos);
  G.dest.name=DEST_POOL[0].name;
  G.dest.mesh.position.copy(DEST_POOL[0].pos);
  G.dest.mesh.visible=false;
  pickupRing.visible=false; arriveRing.visible=false;
  G.pax.forEach((p,i) => {
    const src=PAX_INIT[i];
    p.pos.copy(src.pos); p.active=true;
    p.mesh.position.set(src.pos.x,0,src.pos.z);
    p.mesh.visible=true;
    updatePaxColor(p);
  });
  document.getElementById('et').style.opacity='0';
  document.getElementById('st').style.opacity='0';
  document.getElementById('meter').style.display='none';
  document.getElementById('hd').style.display='none';
  document.getElementById('pax-bar').style.display='none';
  const ch = CHARS[selectedChar];
  showStatus(`${ch.name}で出発！\n${ch.quote}\n🟢 緑マーカーに近づいてゆっくり停車！`, 5);
}

    G.dest.mesh.rotation.y+=.016;
    G.dest.mesh.position.y=Math.sin(ts*.002)*.18;
  }

let lastT=0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,.05); lastT=ts;
  if (G.phase==='PLAY') {
    G.inp.gasK  = !!(keys['KeyW']||keys['ArrowUp']);
    G.inp.brkK  = !!(keys['Space']);
    G.inp.lK    = !!(keys['KeyA']||keys['ArrowLeft']);
    G.inp.rK    = !!(keys['KeyD']||keys['ArrowRight']);
    G.inp.dashK = !!(keys['ShiftLeft']||keys['ShiftRight']);
    G.inp.revK  = !!(keys['KeyS']||keys['ArrowDown']);
    physics(dt);
    carGrp.position.copy(G.pos);
    carGrp.rotation.y=G.hdg;
    updateCam(dt);
    updateTrams(dt);
    updateNpcs(dt);
    gameLogic(dt);
    updateHUD();
    updateMM();
    updateEngineSound();
  }
  animateScene(ts);
  renderer.render(scene, cam);
}

// ═══════════════════════════════════════════════════════════════
//  SOUND SYSTEM (Web Audio API – ファイル不要)
// ═══════════════════════════════════════════════════════════════
let audioCtx = null;
let engineOsc = null, engineGain = null;
let engineStarted = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// ── エンジン音（速度連動ドローン）──────────────────────────────
function startEngine() {
  if (engineStarted) return;
  const ctx = getAudioCtx();
  engineStarted = true;

  engineGain = ctx.createGain();
  engineGain.gain.value = 0;
  engineGain.connect(ctx.destination);

  // 低周波オシレーター×2（うなり音）
  engineOsc = ctx.createOscillator();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 55;

  const engineOsc2 = ctx.createOscillator();
  engineOsc2.type = 'square';
  engineOsc2.frequency.value = 58;

  const distort = ctx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i * 2) / 256 - 1;
    curve[i] = (Math.PI + 300) * x / (Math.PI + 300 * Math.abs(x));
  }
  distort.curve = curve;

  const gainOsc2 = ctx.createGain();
  gainOsc2.gain.value = 0.3;

  engineOsc.connect(distort);
  distort.connect(engineGain);
  engineOsc2.connect(gainOsc2);
  gainOsc2.connect(engineGain);

  engineOsc.start();
  engineOsc2.start();
  // engineOsc2を保持
  engineOsc._osc2 = engineOsc2;
}

function updateEngineSound() {
  if (!engineGain || !engineOsc || G.phase !== 'PLAY') return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const spd = Math.abs(G.spd);
  const freq = 45 + spd * 4.5;
  const vol  = spd < 0.5 ? 0.04 : Math.min(0.22, 0.05 + spd * 0.006);
  engineOsc.frequency.setTargetAtTime(freq, now, 0.1);
  if (engineOsc._osc2) engineOsc._osc2.frequency.setTargetAtTime(freq * 1.055, now, 0.1);
  engineGain.gain.setTargetAtTime(vol, now, 0.08);
}

function stopEngine() {
  if (!engineGain) return;
  const ctx = getAudioCtx();
  engineGain.gain.setTargetAtTime(0, ctx.currentTime, 0.3);
}

// ── 短い効果音ユーティリティ ──────────────────────────────────
function playTone(freq, type, vol, dur, decay=0.15) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur + decay);
  } catch(e) {}
}

function playNoise(vol, dur, freq=800, q=1) {
  try {
    const ctx  = getAudioCtx();
    const buf  = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src    = ctx.createBufferSource();
    const filter = ctx.createBiquadFilter();
    const g      = ctx.createGain();
    src.buffer = buf;
    filter.type = 'bandpass';
    filter.frequency.value = freq;
    filter.Q.value = q;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    src.connect(filter); filter.connect(g); g.connect(ctx.destination);
    src.start();
  } catch(e) {}
}

// ── 各効果音 ────────────────────────────────────────────────
function sndPickup() {
  // 乗車チャイム（上昇3音）
  [523, 659, 784].forEach((f, i) => {
    setTimeout(() => playTone(f, 'sine', 0.18, 0.18), i * 90);
  });
}

function sndArrive(isKamikaze) {
  if (isKamikaze) {
    // KAMIKAZE! - 派手なファンファーレ
    [[523,0],[659,80],[784,160],[1047,260],[1319,360],[784,500],[1047,600]].forEach(([f,t]) => {
      setTimeout(() => playTone(f, 'square', 0.12, 0.18), t);
    });
    setTimeout(() => playNoise(0.15, 0.25, 1200, 2), 600);
  } else {
    // GREAT! - 明るい2音
    [659, 880].forEach((f, i) => {
      setTimeout(() => playTone(f, 'sine', 0.15, 0.22), i * 110);
    });
  }
}

function sndGood() {
  // GOOD - 短い1音
  playTone(523, 'sine', 0.12, 0.2);
}

function sndCollision() {
  // 衝突 - 低音衝撃＋ノイズ
  playTone(80, 'sawtooth', 0.3, 0.35);
  playNoise(0.35, 0.3, 300, 0.8);
}

function sndNearMiss() {
  // ニアミス - シュッという通過音
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.25);
    g.gain.setValueAtTime(0.14, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function sndDrift() {
  // ドリフト - タイヤスキール
  playNoise(0.18, 0.35, 2200, 4);
}

function sndJump() {
  // ジャンプ - 上昇音
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.3);
    g.gain.setValueAtTime(0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.45);
  } catch(e) {}
}

function sndTimeout() {
  // 時間切れ - 下降音
  [440, 349, 262].forEach((f, i) => {
    setTimeout(() => playTone(f, 'square', 0.14, 0.2), i * 130);
  });
}

function sndDash() {
  // 神風ダッシュ - 短い加速音
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.22);
  } catch(e) {}
}

function sndMeterTick() {
  // メータータック - 短い高音クリック
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = 1800;
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.07);
  } catch(e) {}
}
