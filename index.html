<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>広島神風タクシー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--font:'Noto Sans JP','Hiragino Kaku Gothic ProN','Meiryo',sans-serif;--primary:#1A6BC4;--accent:#3AABF0;--dark:#0D1B2A;--card-bg:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:var(--font);}
#load-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;background:linear-gradient(160deg,#0D1B2A 0%,#1A3050 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;}
#load-spinner{width:52px;height:52px;border:4px solid rgba(58,171,240,.25);border-top-color:#3AABF0;border-radius:50%;animation:spin .9s linear infinite;margin-bottom:18px;}
#load-msg{color:#9DCFF5;font-size:15px;font-weight:700;font-family:var(--font);letter-spacing:.08em;}
#load-title{color:#FFD060;font-size:24px;font-weight:900;font-family:var(--font);margin-bottom:28px;text-shadow:0 0 20px rgba(255,208,96,.4);}
@keyframes spin{to{transform:rotate(360deg)}}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;font-family:var(--font);}
.hp{position:absolute;background:rgba(15,15,25,.78);border:1.5px solid rgba(255,220,100,.6);border-radius:6px;padding:4px 10px;color:#fff;font-size:14px;font-weight:700;}
#hm{top:12px;left:12px;color:#FFD060;font-size:17px;}
#ht{top:12px;left:50%;transform:translateX(-50%);font-size:19px;min-width:82px;text-align:center;}
#ht.red{color:#ff5555;animation:blink .5s infinite;}
#hc{top:12px;right:12px;color:#FF9020;font-size:17px;}
#hs{bottom:193px;left:12px;}
#hstatus{bottom:193px;left:128px;font-size:13px;font-weight:700;}
#hstatus.vacant{color:#44FF88;border-color:rgba(68,255,136,.6);}
#hstatus.occupied{color:#FFAA44;border-color:rgba(255,170,68,.6);}
#meter{position:absolute;bottom:95px;left:8px;background:#0A0A0A;border:2px solid #444;border-radius:6px;padding:4px 10px;display:none;flex-direction:column;align-items:center;min-width:90px;box-shadow:0 0 8px rgba(0,0,0,.8);}
#meter-label{font-size:9px;font-weight:700;color:#888;letter-spacing:.12em;text-transform:uppercase;margin-bottom:1px;}
#meter-value{font-size:20px;font-weight:900;color:#FF4400;letter-spacing:.04em;font-variant-numeric:tabular-nums;text-shadow:0 0 8px rgba(255,80,0,.7);transition:color .08s,text-shadow .08s;}
#meter-value.flash{color:#FFFFFF;text-shadow:0 0 14px rgba(255,255,255,.9);}
#meter-unit{font-size:9px;color:#666;margin-top:1px;}
#hd{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);background:rgba(15,15,25,.78);border:1.5px solid rgba(255,120,120,.6);border-radius:6px;padding:4px 14px;color:#FFCCCC;font-size:14px;font-weight:700;text-align:center;display:none;white-space:nowrap;}
#et{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);font-size:40px;font-weight:900;text-shadow:3px 3px 0 rgba(0,0,0,.7);pointer-events:none;opacity:0;letter-spacing:.04em;}
#st{position:absolute;top:52%;left:50%;transform:translateX(-50%);font-size:14px;font-weight:700;color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,.9);text-align:center;pointer-events:none;opacity:0;white-space:pre-line;line-height:1.7;}
#mm{position:absolute;top:60px;right:12px;width:110px;height:110px;background:rgba(10,20,30,.88);border:1.5px solid rgba(255,220,100,.6);border-radius:50%;overflow:hidden;}
#area-label{position:absolute;bottom:168px;right:12px;font-size:11px;font-weight:700;color:rgba(220,235,255,.75);text-shadow:1px 1px 2px rgba(0,0,0,.8);pointer-events:none;}
#tc{position:fixed;bottom:0;left:0;width:100%;height:176px;z-index:20;display:flex;justify-content:space-between;align-items:stretch;padding:6px 8px;pointer-events:none;}
#tc-left{display:flex;flex-direction:row;gap:4px;width:28%;pointer-events:auto;align-items:stretch;height:calc(50% - 2px);align-self:flex-end;}
#tc-mid{display:flex;flex-direction:column;width:20%;pointer-events:auto;height:calc(50% - 2px);align-self:flex-end;}
#tc-right{display:flex;flex-direction:column;gap:4px;width:28%;pointer-events:auto;}
.tb{background:rgba(20,20,30,.6);border:1.5px solid rgba(255,220,100,.55);border-radius:10px;color:#FFD060;font-family:var(--font);font-weight:700;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-align:center;line-height:1.25;transition:background .08s;flex:1;}
.tb.on,.tb:active{background:rgba(255,180,0,.35);}
#tb-dash{background:rgba(140,0,0,.5);border-color:rgba(255,80,80,.65);color:#FF9999;font-size:13px;}
#tb-gas{background:rgba(0,90,10,.5);border-color:rgba(80,255,100,.65);color:#88FF88;}
#tb-rev{background:rgba(0,40,90,.5);border-color:rgba(80,160,255,.65);color:#88CCFF;}
#pax-bar{position:absolute;bottom:198px;left:50%;transform:translateX(-50%);width:200px;height:7px;background:rgba(0,0,0,.4);border-radius:4px;display:none;overflow:hidden;border:1px solid rgba(255,255,255,.2);}
#pax-fill{height:100%;background:#44FF88;border-radius:4px;transition:width .1s linear;}
.scr{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font);}
#title{background:linear-gradient(160deg,#EAF4FF 0%,#C8E4FF 50%,#A0CFFF 100%);}
#title h1{font-size:32px;font-weight:900;color:#0A3D7A;text-shadow:3px 3px 0 rgba(26,107,196,.2);text-align:center;line-height:1.4;margin-bottom:4px;}
.op{color:#1A3A5A;font-size:13px;margin:3px 12px;text-align:center;}.op b{color:var(--primary);}
.start-btn{margin-top:22px;padding:14px 48px;font-size:20px;font-weight:900;font-family:var(--font);background:linear-gradient(135deg,#1A6BC4,#3AABF0);color:#fff;border:none;border-radius:10px;cursor:pointer;box-shadow:0 4px 0 #0A3D7A,0 6px 16px rgba(26,107,196,.35);letter-spacing:.06em;transition:transform .08s,box-shadow .08s;}
.start-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #0A3D7A,0 3px 8px rgba(26,107,196,.2);}
#charsel{background:linear-gradient(160deg,#EAF4FF 0%,#C8E4FF 50%,#A0CFFF 100%);display:none;overflow-y:auto;}
#charsel h2,#vehiclesel h2{font-size:22px;font-weight:900;color:#0A3D7A;margin-bottom:14px;text-align:center;}
#vehiclesel{background:linear-gradient(160deg,#EAF4FF 0%,#C8E4FF 50%,#A0CFFF 100%);display:none;overflow-y:auto;}
.veh-grid,.char-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:min(520px,96vw);padding:0 8px;}
.veh-card,.char-card{background:var(--card-bg);border:2.5px solid #B0D4F0;border-radius:12px;padding:12px;cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.veh-card:hover,.veh-card.sel,.char-card:hover,.char-card.sel{border-color:var(--primary);box-shadow:0 4px 16px rgba(26,107,196,.28);}
.veh-card .vn,.char-card .cn{font-size:15px;font-weight:900;color:var(--dark);margin-bottom:3px;}
.veh-card .vd,.char-card .cq{font-size:11px;color:#777;margin-bottom:7px;}
.char-car{width:48px;height:28px;border-radius:5px;margin:0 auto 8px;border:2px solid rgba(0,0,0,.12);}
.stat-row{display:flex;align-items:center;gap:5px;margin:3px 0;font-size:11px;}
.stat-lbl{width:34px;color:#555;text-align:left;font-weight:700;}
.stat-bar{flex:1;height:7px;background:#D8EAF8;border-radius:4px;overflow:hidden;}
.stat-fill{height:100%;border-radius:4px;transition:width .3s;}
#result{background:linear-gradient(160deg,#EAF4FF 0%,#C8E4FF 50%,#A0CFFF 100%);display:none;}
#result h1{font-size:52px;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.1);margin-bottom:14px;}
.rd{font-size:20px;font-weight:700;color:var(--dark);margin:5px 0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@media(orientation:landscape)and(max-height:500px){#tc{height:120px;}#hs{bottom:130px;}#hstatus{bottom:130px;}#hd{bottom:108px;}#pax-bar{bottom:142px;}#area-label{bottom:112px;}#mm{width:84px;height:84px;top:48px;}#meter{bottom:65px;}}
</style>
</head>
<body>
<div id="load-overlay"><div id="load-title">広島神風タクシー</div><div id="load-spinner"></div><div id="load-msg">マップデータを読み込み中...</div></div>
<div id="title" class="scr" style="display:none">
  <h1>広島神風タクシー</h1>
  <div class="op">🟢 緑マーカーに近づき<b>ゆっくり停車</b> → 乗車</div>
  <div class="op">🔴 赤マーカーの目的地へ<b>爆走</b>して届ける！</div>
  <div class="op">🟣 <b>空港</b>は高速道路で！</div>
  <div class="op" style="margin-top:8px"><b>W/↑</b> アクセル &nbsp; <b>S/↓</b> ブレーキ &nbsp; <b>AD/←→</b> ステアリング &nbsp; <b>Shift</b> 神風ダッシュ</div>
  <button class="start-btn" onclick="showCharSel()">ドライバー選択 →</button>
</div>
<div id="charsel" class="scr"><h2>🚕 ドライバー選択</h2><div class="char-grid" id="char-grid"></div><button class="start-btn" style="margin-top:16px;font-size:18px;padding:12px 36px;" onclick="confirmChar()">車両選択 →</button></div>
<div id="vehiclesel" class="scr" style="display:none"><h2>🚗 車両選択</h2><div class="veh-grid" id="vehicle-grid"></div><button class="start-btn" style="margin-top:16px;font-size:18px;padding:12px 36px;" onclick="confirmVehicle()">出発！ ▶</button></div>
<canvas id="gc"></canvas>
<div id="hud">
  <div class="hp" id="hm">💰 ¥<span id="mv">0</span></div>
  <div class="hp" id="ht">⏱ <span id="tv">1:15</span></div>
  <div class="hp" id="hc">🔥 ×<span id="cv">1.0</span></div>
  <div class="hp" id="hs">🚗 <span id="sv">0</span> km/h</div>
  <div class="hp vacant" id="hstatus">空車</div>
  <div id="meter"><div id="meter-label">FARE</div><div id="meter-value">¥700</div><div id="meter-unit">円</div></div>
  <div id="hd">➤ <span id="dn">---</span>&nbsp;<span id="dd">0m</span></div>
  <div id="et"></div><div id="st"></div>
  <div id="pax-bar"><div id="pax-fill"></div></div>
  <canvas id="mm" width="110" height="110"></canvas>
  <div id="area-label"></div>
</div>
<div id="tc">
  <div id="tc-left"><div class="tb" id="tb-l">◀</div><div class="tb" id="tb-r">▶</div></div>
  <div id="tc-mid"><div class="tb" id="tb-dash">神風<br>DASH</div></div>
  <div id="tc-right"><div class="tb" id="tb-gas">▲</div><div class="tb" id="tb-rev">▼</div></div>
</div>
<div id="result" class="scr">
  <h1 id="rr"></h1>
  <div class="rd">総売上&nbsp;¥<span id="rm">0</span></div>
  <div class="rd">ランク&nbsp;<span id="rl">-</span></div>
  <div class="rd" id="rdeliveries" style="color:#aaa;font-size:16px;margin-top:8px;"></div>
  <div class="rd" id="rconsec" style="color:#8B5000;font-size:15px;"></div>
  <button class="start-btn" style="font-size:18px;padding:12px 36px;margin-top:12px;" onclick="showCharSel()">もう一度！</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const BLD_COLS=[0xCC4444,0x4477CC,0x44AA55,0xCC8844,0x8855AA,0x44AACC,0xCC6644,0x7799AA];
const MAX_SPD=28,DASH_SPD=52,ACCEL=20,BRAKE_F=30,FRICTION=3.5,TURN_FAST=0.88,TURN_SLOW=2.1;
const GAME_SCALE=10,PICKUP_R=14,ARRIVE_R=11,ARRIVE_MAX_SPD=20;
const MAP_XMIN=-230,MAP_XMAX=310,MAP_ZMIN=-175,MAP_ZMAX=220;

// OSM座標変換: 原点=平和大通り×八丁堀 (lat=34.3937, lon=132.4616)
const OSM_ORIGIN_LAT=34.3937,OSM_ORIGIN_LON=132.4616,OSM_METER_PER_UNIT=15;
const OSM_M_PER_DEG_LAT=111320;
const OSM_M_PER_DEG_LON=111320*Math.cos(OSM_ORIGIN_LAT*Math.PI/180);
function latLonToGame(lat,lon){
  return{x:(lon-OSM_ORIGIN_LON)*OSM_M_PER_DEG_LON/OSM_METER_PER_UNIT,
         z:-(lat-OSM_ORIGIN_LAT)*OSM_M_PER_DEG_LAT/OSM_METER_PER_UNIT};
}

// ═══════════════════════════════════════════════════════════════
//  CHARACTERS & VEHICLES
// ═══════════════════════════════════════════════════════════════
const CHARS=[
  {name:'鯉太郎',quote:'カープ魂で届けるけぇ！',accel:1.0,maxSpd:1.0,durability:1.0,carCol:0xCC2222,stat:[3,3,3],color:'#CC4444'},
  {name:'もみじ姐さん',quote:'しゃんしゃん走るけぇね！',accel:0.72,maxSpd:1.42,durability:0.8,carCol:0xCC7700,stat:[2,5,2],color:'#DDAA44'},
  {name:'テッパン政',quote:'アツアツで届けるけぇ！',accel:1.62,maxSpd:0.74,durability:1.0,carCol:0xFFD700,stat:[5,2,3],color:'#FFD700'},
  {name:'原爆ドームじいちゃん',quote:'この道はワシが一番知っとる',accel:0.72,maxSpd:0.74,durability:1.62,carCol:0x333333,stat:[2,2,5],color:'#AAAAAA'},
];
let selectedChar=0;
const VEHICLES=[
  {name:'JPN TAXI',desc:'安定・全場面で活躍',accel:1.0,maxSpd:1.0,durability:1.2,stat:[3,3,4]},
  {name:'コンフォート',desc:'最高速特化・長距離向き',accel:1.0,maxSpd:1.3,durability:1.0,stat:[3,4,3]},
  {name:'ワゴン',desc:'頑丈・遠距離ハイリターン',accel:0.7,maxSpd:0.8,durability:1.6,stat:[2,2,5]},
  {name:'TUK-TUK',desc:'加速最強・小回り抜群',accel:1.8,maxSpd:0.7,durability:0.7,stat:[5,2,2]},
];
let selectedVehicle=0;

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
const G={
  phase:'TITLE',carState:'SEEK',timer:75,earn:0,deliveries:0,spd:0,hdg:0,
  pos:new THREE.Vector3(-50,.5,0),tripDist:0,etTimer:0,stTimer:0,pax:[],
  dest:{pos:new THREE.Vector3(0,0,0),name:'---',mesh:null},
  inp:{gasK:false,brkK:false,lK:false,rK:false,dashK:false,gasT:false,lT:false,rT:false,dashT:false,revT:false,revK:false},
  combo:1.0,tripTips:0,paxTimer:0,paxTimerMax:60,consec:0,maxConsec:0,
  driftTimer:0,driftCool:0,dashCool:0,inAir:false,jumpVel:0,jumpCool:0,
  meterFare:700,meterNextTick:1150,meterFlash:0,
};

// ═══════════════════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════════════════
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('gc'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2.0));
renderer.setSize(innerWidth,innerHeight);
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x7EC8E3);
scene.fog=new THREE.FogExp2(0x89D4E8,.0032);
const cam=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,500);
let camPos=new THREE.Vector3(-40,8,12);
scene.add(new THREE.AmbientLight(0xffffff,.65));
const sun=new THREE.DirectionalLight(0xFFF5E0,1.1); sun.position.set(60,120,80); scene.add(sun);
const fill=new THREE.DirectionalLight(0xCCDDFF,.35); fill.position.set(-40,30,-60); scene.add(fill);
const rim=new THREE.DirectionalLight(0xFFFFFF,.18); rim.position.set(0,-20,-80); scene.add(rim);

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function mk(geo,mat,x=0,y=0,z=0){const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);return m;}
function darken(h,f){return(Math.floor((h>>16&255)*f)<<16)|(Math.floor((h>>8&255)*f)<<8)|Math.floor((h&255)*f);}
function mkMat(col){return new THREE.MeshLambertMaterial({color:col});}
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function mkBody(col){return new THREE.MeshPhongMaterial({color:col,specular:0xFFFFFF,shininess:120,reflectivity:1});}
function mkGlass(){return new THREE.MeshPhongMaterial({color:0x88AACC,specular:0xFFFFFF,shininess:200,transparent:true,opacity:0.52,side:THREE.DoubleSide});}
function mkChrome(){return new THREE.MeshPhongMaterial({color:0xCCCCCC,specular:0xFFFFFF,shininess:300});}
function mkTire(){return new THREE.MeshPhongMaterial({color:0x1A1A1A,specular:0x222222,shininess:10});}
function mkHub(col=0xBBBBBB){return new THREE.MeshPhongMaterial({color:col,specular:0xFFFFFF,shininess:200});}
function mkLight(col){return new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.45,specular:0xFFFFFF,shininess:150});}
function mkPlastic(col){return new THREE.MeshPhongMaterial({color:col,specular:0x444444,shininess:30});}

// ═══════════════════════════════════════════════════════════════
//  ROAD MATERIALS & SEGMENTS
// ═══════════════════════════════════════════════════════════════
const roadMat=mkMat(0x2E2E2E),hwyMat=mkMat(0x3A3A3A),sdwkMat=mkMat(0x9A9880),lineMat=mkMat(0xDDDDAA);
const ROAD_SEGS=[],OBS_BOX=[],OBS_CIR=[],CAR_R=1.6;

function buildRoadSeg(x1,z1,x2,z2,width,mat,isHwy=false){
  ROAD_SEGS.push({x1,z1,x2,z2,w:width,isHwy});
  const dx=x2-x1,dz=z2-z1,len=Math.sqrt(dx*dx+dz*dz);
  if(len<0.1)return;
  const angle=Math.atan2(dx,dz),cx=(x1+x2)/2,cz=(z1+z2)/2,yOff=isHwy?0.38:0.02;
  if(isHwy){
    const base=mk(new THREE.BoxGeometry(width+3,0.34,len+1),mkMat(0x666666),cx,0.17,cz);
    base.rotation.y=angle;scene.add(base);
    const nx=-dz/len,nz=dx/len;
    [-(width/2+0.8),width/2+0.8].forEach(side=>{
      const gr=mk(new THREE.BoxGeometry(0.5,0.6,len),mkMat(0x999999),cx+nx*side,yOff+0.3,cz+nz*side);
      gr.rotation.y=angle;scene.add(gr);
    });
  }else{
    const sw=mk(new THREE.BoxGeometry(width+4,0.03,len+1),sdwkMat,cx,0.01,cz);
    sw.rotation.y=angle;scene.add(sw);
  }
  const road=mk(new THREE.BoxGeometry(width,0.06,len),mat,cx,yOff,cz);
  road.rotation.y=angle;scene.add(road);
  const isTram=(Math.abs(z1)<1.0&&Math.abs(z2)<1.0);
  if(width>=9&&!isTram){
    const nL=Math.floor(len/22),dashMat=isHwy?mkMat(0xFFFFAA):lineMat;
    for(let i=0;i<nL;i++){
      const t=(i+0.5)/nL,lx=x1+dx*t,lz2=z1+dz*t;
      const lm=mk(new THREE.BoxGeometry(0.35,0.07,isHwy?10:7),dashMat,lx,yOff+0.02,lz2);
      lm.rotation.y=angle;scene.add(lm);
    }
    if(isHwy){
      const nx2=-dz/len,nz2=dx/len;
      [-(width/2-1.2),width/2-1.2].forEach(side=>{
        const el=mk(new THREE.BoxGeometry(0.45,0.07,len),mkMat(0xFFFFFF),cx+nx2*side,yOff+0.02,cz+nz2*side);
        el.rotation.y=angle;scene.add(el);
      });
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  OSM MAP BUILDING
// ═══════════════════════════════════════════════════════════════
function buildRoadsFromOsm(elements){
  const nodes={};
  elements.forEach(e=>{if(e.type==='node')nodes[e.id]=e;});
  const W={trunk:20,motorway:20,primary:14,secondary:10,tertiary:8,residential:6};
  elements.filter(e=>e.type==='way').forEach(way=>{
    const tags=way.tags||{},hw=tags.highway;
    if(!hw||tags.railway||tags.building)return;
    const isHwy=['trunk','motorway'].includes(hw);
    const width=W[hw]||7,mat=isHwy?hwyMat:roadMat;
    for(let i=0;i<way.nodes.length-1;i++){

function buildBuildingsFromOsm(elements){
  const nodes={};
  elements.forEach(e=>{if(e.type==='node')nodes[e.id]=e;});
  elements.filter(e=>e.type==='way'&&e.tags&&e.tags.building).forEach(way=>{
    if(way.nodes.length<4)return;
    const pts=way.nodes.slice(0,-1).map(nid=>{const n=nodes[nid];return n?latLonToGame(n.lat,n.lon):null;}).filter(Boolean);
    if(pts.length<3)return;
    const levels=parseInt(way.tags['building:levels'])||3,height=Math.max(3,levels*3.5);
    const shape=new THREE.Shape();
    pts.forEach((p,i)=>{if(i===0)shape.moveTo(p.x,-p.z);else shape.lineTo(p.x,-p.z);});
    shape.closePath();
    try{
      const geo=new THREE.ExtrudeGeometry(shape,{depth:height,bevelEnabled:false});
      geo.rotateX(-Math.PI/2);
      const col=BLD_COLS[Math.floor(Math.random()*BLD_COLS.length)];
      scene.add(new THREE.Mesh(geo,mkMat(col)));
      const roofGeo=new THREE.ExtrudeGeometry(shape,{depth:0.5,bevelEnabled:false});
      roofGeo.rotateX(-Math.PI/2);
      const roof=new THREE.Mesh(roofGeo,mkMat(darken(col,0.68)));
      roof.position.y=height;scene.add(roof);
      let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
      pts.forEach(p=>{minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minZ=Math.min(minZ,p.z);maxZ=Math.max(maxZ,p.z);});
      if((maxX-minX)>1&&(maxZ-minZ)>1)OBS_BOX.push({cx:(minX+maxX)/2,cz:(minZ+maxZ)/2,hw:(maxX-minX)/2+0.2,hd:(maxZ-minZ)/2+0.2});
    }catch(e){}
  });
}

}

async function loadAndBuildMap(){
  const loadMsg=document.getElementById('load-msg');
  try{
    loadMsg.textContent='マップデータを読み込み中...';
    let elements=[];
    try{
      const res=await fetch('data/hiroshima_center.json');
      if(!res.ok)throw new Error('HTTP '+res.status);
      const osmData=await res.json();
      elements=osmData.elements||[];
      console.log('✅ OSMファイル読み込み成功');
    }catch(fetchErr){
      console.log('ℹ️ 埋め込みOSMデータを使用');
      elements=EMBEDDED_OSM.elements||[];
    }
    loadMsg.textContent='地面を構築中...';
    const gnd=mk(new THREE.PlaneGeometry(800,600),mkMat(0x4A6741),30,0,20);
    gnd.rotation.x=-Math.PI/2;scene.add(gnd);
    loadMsg.textContent='道路ネットワークを構築中...';
    buildRoadsFromOsm(elements);
    loadMsg.textContent='建物を配置中...';
    buildBuildingsFromOsm(elements);
    loadMsg.textContent='ランドマークを配置中...';
    placeLandmarksFromOsm(elements);
    loadMsg.textContent='樹木・自然を配置中...';
    buildTreesOsm();
    loadMsg.textContent='比治山・空港を構築中...';
    buildHijiyamaSlope();buildManualElements();
    console.log('✅ OSMマップ構築完了');
  }catch(e){
    console.warn('⚠️ マップ構築エラー:',e.message,'→フォールバック使用');
    loadMsg.textContent='フォールバックマップを使用します...';
    buildFallbackMap();
  }
}

// 比治山スロープ
const SLOPE_X=85,SLOPE_Z=30,SLOPE_LEN=10,SLOPE_H=6,SLOPE_W=9;
const JUMP_ZONE={x:85,z:30,r:10,h:6};
function buildHijiyamaSlope(){
  const sM=mkMat(0x505848),hM=mkMat(0x556644),wM=mkMat(0x887766);
  const hill=mk(new THREE.CylinderGeometry(8,13,SLOPE_H,8),hM,SLOPE_X,SLOPE_H/2-0.5,SLOPE_Z);
  scene.add(hill);OBS_CIR.push({cx:SLOPE_X,cz:SLOPE_Z,r:13});
  scene.add(mk(new THREE.CylinderGeometry(5,7,1.5,8),hM,SLOPE_X,SLOPE_H+0.2,SLOPE_Z));
  const sa=Math.atan2(SLOPE_H,SLOPE_LEN);
  const ss=mk(new THREE.BoxGeometry(SLOPE_W,0.4,SLOPE_LEN),sM,SLOPE_X,SLOPE_H/2-0.2,SLOPE_Z+SLOPE_LEN/2+2);
  ss.rotation.x=sa;ss.position.y=SLOPE_H/2-0.2;ss.position.z=SLOPE_Z+SLOPE_LEN/2+2;scene.add(ss);
  const wall=mk(new THREE.BoxGeometry(SLOPE_W,SLOPE_H,1.5),wM,SLOPE_X,SLOPE_H/2,SLOPE_Z+SLOPE_LEN+1);
  scene.add(wall);OBS_BOX.push({cx:SLOPE_X,cz:SLOPE_Z+SLOPE_LEN+1,hw:SLOPE_W/2,hd:0.75});
  OBS_BOX.push({cx:SLOPE_X-SLOPE_W/2,cz:SLOPE_Z+SLOPE_LEN/2+2,hw:0.5,hd:SLOPE_LEN/2});
  OBS_BOX.push({cx:SLOPE_X+SLOPE_W/2,cz:SLOPE_Z+SLOPE_LEN/2+2,hw:0.5,hd:SLOPE_LEN/2});
  const grM=mkMat(0xAAAAAA);
  [-SLOPE_W/2-0.3,SLOPE_W/2+0.3].forEach(dx=>{
    for(let i=0;i<3;i++){
      const gz=SLOPE_Z+SLOPE_LEN/2+i*4-2,gy=(i/2)*SLOPE_H+0.5;
      scene.add(mk(new THREE.BoxGeometry(0.3,0.6,4),grM,SLOPE_X+dx,gy+0.3,gz));
    }
  });
  scene.add(mk(new THREE.CylinderGeometry(6,6,0.3,8),sM,SLOPE_X,SLOPE_H+0.15,SLOPE_Z));
  const tM=mkMat(0x5C3317),lM=mkMat(0x228B22);
  [[SLOPE_X-7,SLOPE_Z-5],[SLOPE_X+7,SLOPE_Z-5],[SLOPE_X-6,SLOPE_Z+5],[SLOPE_X+6,SLOPE_Z+5]].forEach(([tx,tz])=>{
    scene.add(mk(new THREE.CylinderGeometry(.3,.35,2.5,5),tM,tx,SLOPE_H+1.25,tz));
    scene.add(mk(new THREE.CylinderGeometry(0,2.2,3.5,6),lM,tx,SLOPE_H+4.2,tz));
  });
  const ramp=mk(new THREE.BoxGeometry(SLOPE_W,0.5,4),mkMat(0x666655),SLOPE_X,SLOPE_H+0.25,SLOPE_Z+8);
  ramp.rotation.x=-0.25;scene.add(ramp);
}
function isOnSlope(){const dx=G.pos.x-JUMP_ZONE.x,dz=G.pos.z-JUMP_ZONE.z;return Math.sqrt(dx*dx+dz*dz)<JUMP_ZONE.r;}

function buildMazdaStadium(cx=136,cz=1){
  const cM=mkMat(0xDDCCBB),rM=mkMat(0xCC1111),grp=new THREE.Group(),SIDES=12,R=14,wallH=8;
  for(let i=0;i<SIDES;i++){

function updateTrams(dt) {
  if (G.phase !== 'PLAY') return;
  trams.forEach(tr => {
    const r   = tr.route;
    const len = Math.hypot(r.x2-r.x1, r.z2-r.z1);
    const dx  = (r.x2-r.x1)/len, dz = (r.z2-r.z1)/len;
    tr.t += tr.dir * r.spd * dt / len;
    if (tr.t >= 1) { tr.t = 1; tr.dir = -1; }
    if (tr.t <= 0) { tr.t = 0; tr.dir =  1; }
    const tx = r.x1 + dx*len*tr.t;
    const tz = r.z1 + dz*len*tr.t;
    tr.mesh.position.set(tx, 0, tz);
    const fdx = dx*tr.dir, fdz = dz*tr.dir;
    tr.mesh.rotation.y = Math.atan2(-fdx, -fdz);

    const dist = Math.hypot(G.pos.x-tx, G.pos.z-tz);
    if (dist < TRAM_HIT_R) {
      const now = performance.now();
      if (now - lastHitTime > 500) {
        lastHitTime = now;
        G.spd *= -0.35;
        applyCollisionPenalty('広電に衝突！', 0.45);
      }
    } else if (dist < TRAM_NEAR_R && G.phase === 'PLAY') {
      const now = performance.now();
      if (now - tramLastNearMs > 2000) {
        tramLastNearMs = now;
        addTip('near');
      }
    }
  });
}

function buildTramTracks() {
  const railM   = mkMat(0x777770);
  const tieM    = mkMat(0x554433);
  const concrM  = mkMat(0xCCCABE);
  const yellowM = mkMat(0xEECC00);
  const x1=-175, x2=100, z=0;
  const len = x2 - x1;
  const cx  = (x1+x2)/2;

  const zone = mk(new THREE.PlaneGeometry(len, 5.0), concrM, cx, .018, z);
  zone.rotation.x = -Math.PI/2; scene.add(zone);
  [-2.55,2.55].forEach(oz => {
    scene.add(mk(new THREE.BoxGeometry(len,.08,.18), mkMat(0xBBB9AD), cx,.04,z+oz));
  });
  [-2.7,2.7].forEach(oz => {
    const blockCount = Math.floor(len/4);
    for (let i=0; i<blockCount; i++) {
      const tx = x1 + (i+0.5)*(len/blockCount);
      scene.add(mk(new THREE.BoxGeometry(2.4,.18,.28), yellowM, tx,.09,z+oz));
    }
  });
  const tieCount = Math.floor(len/4.5);
  for (let i=0; i<=tieCount; i++) {
    const tx = x1 + i*(len/tieCount);
    scene.add(mk(new THREE.BoxGeometry(.28,.1,3.6), tieM, tx,.12,z));
  }
  [-1.15,1.15].forEach(oz => {
    scene.add(mk(new THREE.BoxGeometry(len,.12,.16), railM, cx,.2,z+oz));
  });
}

const NPC_COLORS = [
  0xCC3333,0x3355CC,0x228833,0xCCAA22,
  0x888888,0xCC6622,0x44AACC,0xCC4488,
];
const NPC_HIT_R  = 4.0;
const NPC_NEAR_R = 7.0;
let npcLastNearMs = -9999999;
const npcs = [];

function buildNpcVehicle(route, idx) {
  const grp  = new THREE.Group();
  const col  = NPC_COLORS[idx % NPC_COLORS.length];
  const bodyM = mkBody(col);
  const dkM   = mkPlastic(0x1A2A38);
  const gmM   = mkChrome();
  const hlM   = mkLight(0xFFFFBB);
  const tlM   = mkLight(0xFF2200);
  const type  = idx % 3;
  const bw = type===2 ? 1.7 : 2.0;
  const bh = type===1 ? 0.75: 0.65;
  const bl = type===2 ? 3.2 : type===1 ? 4.4 : 3.8;
  const ch = type===1 ? 0.7 : 0.62;
  const cl = type===1 ? 2.8 : 2.0;

  grp.add(mk(new THREE.BoxGeometry(bw,bh,bl), bodyM, 0,.55,0));
  grp.add(mk(new THREE.BoxGeometry(bw*.88,ch,cl), bodyM, 0,bh+ch/2+.05,type===1?-.2:.1));
  const ww = bw*.82;
  grp.add(mk(new THREE.BoxGeometry(ww,.42,.1), dkM, 0,bh+.22,-(cl/2+.05)));
  grp.add(mk(new THREE.BoxGeometry(ww,.38,.1), dkM, 0,bh+.18,  cl/2+.05));
  grp.add(mk(new THREE.BoxGeometry(bw*.88,.28,.16), gmM, 0,.28,-(bl/2+.08)));
  grp.add(mk(new THREE.BoxGeometry(bw*.88,.28,.16), gmM, 0,.28,  bl/2+.08));
  [-.55,.55].forEach(ox => {
    grp.add(mk(new THREE.BoxGeometry(.38,.22,.12), hlM, ox*.9*bw,.55,-(bl/2+.07)));
    grp.add(mk(new THREE.BoxGeometry(.38,.18,.12), tlM, ox*.9*bw,.55,  bl/2+.07));
  });
  const wkGeo = new THREE.CylinderGeometry(.38,.38,.3,8);
  const wkM   = mkMat(0x1A1A1A);
  [[-bw/2-.16,.38,-(bl/2-.7)],[bw/2+.16,.38,-(bl/2-.7)],
   [-bw/2-.16,.38,  bl/2-.7 ],[bw/2+.16,.38,  bl/2-.7 ]].forEach(([wx,wy,wz])=>{
    const wm = new THREE.Mesh(wkGeo, wkM);
    wm.rotation.z = Math.PI/2;
    wm.position.set(wx,wy,wz);
    grp.add(wm);
  });

  const r   = route;
  const len = Math.hypot(r.x2-r.x1, r.z2-r.z1);
  const dx  = (r.x2-r.x1)/len, dz = (r.z2-r.z1)/len;
  const nx  = -dz, nz = dx;
  const ix  = r.x1 + dx*len*r.t + nx*r.lo;
  const iz  = r.z1 + dz*len*r.t + nz*r.lo;
  grp.position.set(ix, 0, iz);
  grp.rotation.y = Math.atan2(-dx, -dz);
  scene.add(grp);
  npcs.push({ mesh:grp, route:r, t:r.t });
}

function buildNpcs() {
  NPC_ROUTES.forEach((route, i) => buildNpcVehicle(route, i));
}

function updateNpcs(dt) {
  if (G.phase !== 'PLAY') return;
  npcs.forEach(npc => {
    const r   = npc.route;
    const len = Math.hypot(r.x2-r.x1, r.z2-r.z1);
    const dx  = (r.x2-r.x1)/len, dz = (r.z2-r.z1)/len;
    const nx  = -dz, nz = dx;
    npc.t += r.spd * dt / len;
    if (npc.t >= 1) npc.t -= 1;
    const tx = r.x1 + dx*len*npc.t + nx*r.lo;
    const tz = r.z1 + dz*len*npc.t + nz*r.lo;
    npc.mesh.position.set(tx, 0, tz);
    npc.mesh.rotation.y = Math.atan2(-dx, -dz);
    const wr = r.spd * .04;
    npc.mesh.children.forEach((c,i) => { if (i >= 10) c.rotation.x += wr; });
    const dist = Math.hypot(G.pos.x-tx, G.pos.z-tz);
    if (dist < NPC_HIT_R) {
      const now = performance.now();
      if (now - lastHitTime > 500) {
        lastHitTime = now;
        G.spd *= -0.3;
        applyCollisionPenalty('車に衝突！', 0.32);
      }
    } else if (dist < NPC_NEAR_R) {
      const now = performance.now();
      if (now - npcLastNearMs > 1500) {
        npcLastNearMs = now;
        addTip('near');
      }
    }
  });
}

function setupTouch() {
  const MAP = { 'tb-l':'lT','tb-r':'rT','tb-gas':'gasT','tb-dash':'dashT','tb-rev':'revT' };
  Object.entries(MAP).forEach(([id,key]) => {
    const el = document.getElementById(id);
    const on=()=>{ G.inp[key]=true; el.classList.add('on'); };
    const off=()=>{ G.inp[key]=false; el.classList.remove('on'); };
    el.addEventListener('touchstart', e=>{e.preventDefault();on();},{passive:false});

    el.addEventListener('mousedown',  on);
    el.addEventListener('mouseup',    off);
    el.addEventListener('mouseleave', off);
  });
}

// ═══════════════════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════════════════
function resolveCollisions(newX, newZ) {
  let rx = newX, rz = newZ;
  let hit = false;
  for (const b of OBS_BOX) {
    const cx = Math.max(b.cx-b.hw, Math.min(b.cx+b.hw, rx));
    const cz = Math.max(b.cz-b.hd, Math.min(b.cz+b.hd, rz));
    const dx = rx-cx, dz = rz-cz;
    const dist = Math.sqrt(dx*dx+dz*dz);
    if (dist < CAR_R && dist > 0.001) {
      const nx=dx/dist, nz=dz/dist, pen=CAR_R-dist;
      rx += nx*pen; rz += nz*pen; hit = true;
    }
  }
  for (const t of OBS_CIR) {
    const dx=rx-t.cx, dz=rz-t.cz;
    const dist=Math.sqrt(dx*dx+dz*dz);
    const minD=CAR_R+t.r;
    if (dist < minD && dist > 0.001) {
      const nx=dx/dist, nz=dz/dist;
      rx += nx*(minD-dist); rz += nz*(minD-dist); hit = true;
    }
  }
  return { rx, rz, hit };
}

// ═══════════════════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════════════════
function physics(dt) {
  const ch=CHARS[selectedChar], veh=VEHICLES[selectedVehicle];
  const effAccel  = ACCEL   * ch.accel   * veh.accel;
  const effMaxSpd = MAX_SPD * ch.maxSpd  * veh.maxSpd;
  const effDashSpd= DASH_SPD* ch.maxSpd  * veh.maxSpd;
  const effDur    = Math.min(2.0, ch.durability * veh.durability);
  const i=G.inp;
  const gas=i.gasK||i.gasT, brk=i.brkK||i.brkT;
  const rev=i.revK||i.revT;
  const lft=i.lK||i.lT, rgt=i.rK||i.rT, dash=i.dashK||i.dashT;
  const mxs=dash?effDashSpd:effMaxSpd;
  if (gas) {
    G.spd=G.spd<0?G.spd+BRAKE_F*dt:Math.min(G.spd+(dash?effAccel*2.2:effAccel)*dt,mxs);
  } else if (rev) {
    G.spd=G.spd>0?G.spd-BRAKE_F*dt:Math.max(G.spd-effAccel*.55*dt,-9);
  } else if (brk) {
    const f=BRAKE_F*dt;
    G.spd=Math.abs(G.spd)<f?0:G.spd-Math.sign(G.spd)*f;
  } else {
    const f=FRICTION*dt;
    G.spd=Math.abs(G.spd)<f?0:G.spd-Math.sign(G.spd)*f;
  }
  const hdgPrev=G.hdg;
  if (Math.abs(G.spd)>.4) {
    const sr=Math.min(Math.abs(G.spd)/MAX_SPD,1);
    const tr=TURN_SLOW+(TURN_FAST-TURN_SLOW)*sr;
    const ddir=Math.sign(G.spd);
    if (lft) G.hdg+=tr*dt*ddir;
    if (rgt) G.hdg-=tr*dt*ddir;
  }
  const hdgRate=Math.abs(G.hdg-hdgPrev)/dt;
  G.driftCool=Math.max(0,G.driftCool-dt);
  G.driftTimer=(hdgRate>1.1&&Math.abs(G.spd)>effMaxSpd*0.45)?G.driftTimer+dt:0;
  if (G.driftTimer>0.28&&G.driftCool<=0) {
    addTip('drift'); G.driftTimer=0; G.driftCool=1.4;
  }
  const prev=G.pos.clone();
  const sh=Math.sin(G.hdg), cv=Math.cos(G.hdg);
  let nx=G.pos.x-sh*G.spd*dt;
  let nz=G.pos.z-cv*G.spd*dt;
  nx=Math.max(MAP_XMIN,Math.min(MAP_XMAX,nx));
  nz=Math.max(MAP_ZMIN,Math.min(MAP_ZMAX,nz));
  const {rx,rz,hit}=resolveCollisions(nx,nz);
  G.pos.x=rx; G.pos.z=rz;

  G.jumpCool=Math.max(0,G.jumpCool-dt);
  if (!G.inAir&&G.jumpCool<=0&&isOnSlope()&&G.spd>effMaxSpd*0.65) {
    G.inAir=true; G.jumpVel=9.5+G.spd*0.18; G.jumpCool=3.0; addTip('jump');
  }
  if (G.inAir) {
    G.jumpVel-=18*dt;
    G.pos.y=Math.max(0.5,G.pos.y+G.jumpVel*dt);
    if (G.pos.y<=0.5&&G.jumpVel<0) { G.inAir=false; G.jumpVel=0; G.pos.y=0.5; }
  } else { G.pos.y=0.5; }

  if (hit) {
    const now=performance.now();
    if (now-lastHitTime>400) {
      lastHitTime=now;
      const impact=Math.abs(G.spd);
      G.spd*=-0.25*effDur;
      if (impact>3) applyCollisionPenalty('衝突！',0.28/effDur);
    } else { G.spd=0; }
  }
  if (G.carState==='RIDE') G.tripDist+=prev.distanceTo(G.pos)*GAME_SCALE;
}

// ═══════════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════════
function updateCam(dt) {
  const sh=Math.sin(G.hdg), ch=Math.cos(G.hdg);
  const tgt=new THREE.Vector3(G.pos.x+sh*11,G.pos.y+5.5,G.pos.z+ch*11);
  camPos.lerp(tgt,.1);
  cam.position.copy(camPos);
  let sx=0,sy=0;
  if (shakeTimer>0) {
    shakeTimer-=dt;
    const mag=shakeTimer*1.2;
    sx=(Math.random()-.5)*mag; sy=(Math.random()-.5)*mag*0.5;
  }
  cam.lookAt(G.pos.x+sx,G.pos.y+1.6+sy,G.pos.z);
}

const DRIVE_LINES = ['おおー！ぶち速いのぉ！','ひゃー！たまげたわ！','あんた神風じゃのう！','こりゃカープの応援より興奮するわ！'];
const HWY_LINES  = ['高速じゃ！ぶち速いのう！','飛行機よりこのタクシーのほうが速いんじゃないか！','ワシの心臓がもつかのう…でも最高じゃ！'];

function applyCollisionPenalty(label,shakeDur) {
  sndCollision();
  const penalty=50;
  if (G.carState==='RIDE') {
    G.tripTips=Math.max(0,G.tripTips-penalty);
    showEval(`${label}  −¥${penalty}`,'#FF5555',1.4);
  } else { showEval(label,'#FF5555',1.2); }
  shakeTimer=shakeDur; G.combo=1.0; G.consec=0;
}

// ═══════════════════════════════════════════════════════════════
const TIP_BASE  = { drift:50,near:30,jump:100,hop:20,dash:30 };
const TIP_LABEL = {
  drift:['神風ドリフト！','ドリフト！'],
  near: ['ニアミス！'],
  jump: ['神風ジャンプ！！'],
  hop:  ['神風ホップ！'],
  dash: ['神風ダッシュ！'],
};
function addTip(type) {
  if (G.carState!=='RIDE') return;
  const base=TIP_BASE[type]||100;
  const spdBonus=Math.floor(Math.abs(G.spd)/4)*10;
  const amount=Math.round((base+spdBonus)/10)*10;
  G.tripTips+=amount;
  G.combo=Math.min(5.0,parseFloat((G.combo+0.35).toFixed(1)));
  G.maxCombo=Math.max(G.maxCombo||1.0,G.combo);
  if (type==='near') sndNearMiss();
  else if (type==='drift') sndDrift();
  else if (type==='jump')  sndJump();
  else if (type==='dash')  sndDash();
  const labels=TIP_LABEL[type]||['テクニック！'];
  showEval(`${labels[Math.floor(Math.random()*labels.length)]}  +¥${amount.toLocaleString()}`,'#FFD060',1.1);
}

// ═══════════════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════════════
let onHighwaySince = -1;

function gameLogic(dt) {
  if (G.phase!=='PLAY') return;
  G.timer-=dt;
  if (G.timer<=0) { G.timer=0; endGame(); return; }

  // 高速道路判定（空港高速エリア）
  const isOnHwy = G.pos.x > 120 && G.pos.z < -20;
  if (isOnHwy&&onHighwaySince<0) {
    onHighwaySince=G.timer; showEval('高速道路','#AAFFFF',1.5);
  } else if (!isOnHwy) { onHighwaySince=-1; }

  document.getElementById('area-label').textContent=getAreaName();

  let nearestPax=null, nearestD=999;
  if (G.carState==='SEEK') {
    G.pax.forEach(p => {
      if (!p.active) return;
      const d=G.pos.distanceTo(p.pos);
      if (d<nearestD) { nearestD=d; nearestPax=p; }
    });
    if (nearestPax&&nearestD<PICKUP_R*2.5) {
      pickupRing.position.set(nearestPax.pos.x,.05,nearestPax.pos.z);
      pickupRing.visible=true;
    } else { pickupRing.visible=false; }
    arriveRing.visible=false;
  } else if (G.carState==='RIDE') {
    pickupRing.visible=false;
    const dTD=G.pos.distanceTo(G.dest.pos);
    if (dTD<ARRIVE_R*2.5) {
      arriveRing.position.set(G.dest.pos.x,.05,G.dest.pos.z); arriveRing.visible=true;
    } else { arriveRing.visible=false; }
  } else { pickupRing.visible=false; arriveRing.visible=false; }

  if (G.carState==='SEEK') {
    G.pax.forEach(p => {
      if (!p.active) return;
      if (G.pos.distanceTo(p.pos)<PICKUP_R&&Math.abs(G.spd)<10) {
        p.active=false; p.mesh.visible=false;
        G.carState='RIDE'; G.tripDist=0; G.tripTips=0;
        const isAirportDest=G.dest.name.includes('空港');
        G.meterFare=isAirportDest?17000:700;
        G.meterNextTick=isAirportDest?Infinity:1150; G.meterFlash=0;
        const d2d=p.pos.distanceTo(G.dest.pos);
        const timerBonus=d2d>90?30:d2d>45?22:15;
        G.timer+=timerBonus;
        G.paxTimerMax=d2d>90?90:d2d>45?65:45; G.paxTimer=G.paxTimerMax;
        G.dest.mesh.visible=true;
        document.getElementById('meter').style.display='flex';
        document.getElementById('hd').style.display='';
        document.getElementById('pax-bar').style.display='';
        document.getElementById('dn').textContent=G.dest.name;
        showEval('乗車！','#00FF88',1.8); sndPickup();
        const isAirport=G.dest.name.includes('空港');
        showStatus(`「${getBoardLine(G.dest.name)}」\n➤ ${G.dest.name}${isAirport?'\n🟣 高速道路を利用してください！':''}`);
        paxRespawnT=8;
      }
    });
  }

  if (G.carState==='RIDE') {
    G.paxTimer-=dt;
    if (G.paxTimer<=0) {
      G.paxTimer=0;
      showEval('時間切れ！運賃ゼロ…','#FF4444',2.5); sndTimeout();
      showStatus('「もうええわ！降りるけぇ！」');
      G.carState='WAIT'; G.tripTips=0; G.combo=1.0; G.consec=0;
      G.dest.mesh.visible=false;
      document.getElementById('meter').style.display='none';
      document.getElementById('hd').style.display='none';
      document.getElementById('pax-bar').style.display='none';
      destI=(destI+1)%DEST_POOL.length;
      G.dest.pos.copy(DEST_POOL[destI].pos); G.dest.name=DEST_POOL[destI].name;
      G.dest.mesh.position.copy(DEST_POOL[destI].pos);
      setTimeout(()=>{ G.carState='SEEK'; },2400);
    }
  }

  if (paxRespawnT>0) {
    paxRespawnT-=dt;
    if (paxRespawnT<=0) {
      paxRespawnT=-1;
      const di=G.pax.findIndex(p=>!p.active);
      if (di>=0) {
        const src=EXTRA_PAX[extraPaxI%EXTRA_PAX.length]; extraPaxI++;
        G.pax[di].pos.copy(src); G.pax[di].mesh.position.copy(src);
        G.pax[di].active=true; G.pax[di].mesh.visible=true;
        updatePaxColor(G.pax[di]);
      }
    }
  }

  if (G.carState==='RIDE') {
    G.meterFlash=Math.max(0,G.meterFlash-dt);
    while (G.tripDist>=G.meterNextTick&&G.meterNextTick!==Infinity) {
      G.meterFare+=100; G.meterNextTick+=300; G.meterFlash=0.25; sndMeterTick();
    }
  }

  if (G.carState==='RIDE') {
    const distToDest=G.pos.distanceTo(G.dest.pos);
    const meterEl=document.getElementById('meter-value');
    meterEl.textContent='¥'+G.meterFare.toLocaleString();
    if (G.meterFlash>0) { meterEl.classList.add('flash'); } else { meterEl.classList.remove('flash'); }
    document.getElementById('dd').textContent=
      distToDest>999?Math.floor(distToDest/10)+'km':Math.floor(getDistReal(distToDest))+'m';
    if (G.spd>MAX_SPD*.7&&G.etTimer<=0&&Math.random()<.003)
      showEval(isOnHwy&&Math.random()<.4?rand(HWY_LINES):rand(DRIVE_LINES),'#AADDFF',1.4);
    if (distToDest<ARRIVE_R&&Math.abs(G.spd)<ARRIVE_MAX_SPD) {
      const f=G.meterFare;
      const tips=Math.round(G.tripTips*G.combo/10)*10;
      const kmh=G.spd*3.6;
      let speedBonus=0,etxt='GOOD',ecol='#ffffff';
      if (kmh>55){ etxt='KAMIKAZE!';ecol='#FFD700';speedBonus=500;G.timer+=5;sndArrive(true); }
      else if (kmh>22){ etxt='GREAT!';ecol='#FFFF44';speedBonus=200;G.timer+=2;sndArrive(false); }
      else { sndGood(); }
      G.consec++; G.maxConsec=Math.max(G.maxConsec,G.consec);
      const consecBonus=G.consec>=3?G.consec*200:0;
      const total=f+tips+speedBonus+consecBonus;
      G.earn+=total; G.deliveries++;
      const parts=[`基本¥${f.toLocaleString()}`];
      if (tips>0) parts.push(`チップ¥${tips.toLocaleString()}`);
      if (speedBonus>0) parts.push(`スピードボーナス¥${speedBonus}`);
      if (consecBonus>0) parts.push(`連続×${G.consec}ボーナス¥${consecBonus}`);
      showEval(etxt,ecol,2.8);
      showStatus(`${rand(ARRIVE_LINES)}\n${parts.join('  ')}\n合計+¥${total.toLocaleString()}`);
      G.combo=Math.min(5.0,parseFloat((G.combo+0.1).toFixed(1)));
      G.tripTips=0; G.carState='WAIT'; G.dest.mesh.visible=false;
      pickupRing.visible=false; arriveRing.visible=false;
      document.getElementById('meter').style.display='none';
      document.getElementById('hd').style.display='none';
      document.getElementById('pax-bar').style.display='none';
      destI=(destI+1)%DEST_POOL.length;
      G.dest.pos.copy(DEST_POOL[destI].pos); G.dest.name=DEST_POOL[destI].name;
      G.dest.mesh.position.copy(DEST_POOL[destI].pos);
      G.pax.forEach(p=>{ if(p.active) updatePaxColor(p); });
      setTimeout(()=>{ G.carState='SEEK'; },2400);
    }
  }

  G.dashCool=Math.max(0,G.dashCool-dt);
  if ((G.inp.dashK||G.inp.dashT)&&G.spd>8&&G.dashCool<=0) {
    G.dashCool=1.8;
    if (G.carState==='RIDE') addTip('dash');
    else showEval('神風ダッシュ！','#FF8800',.7);
  }
  G.etTimer-=dt; if(G.etTimer<=0) document.getElementById('et').style.opacity='0';
  G.stTimer-=dt; if(G.stTimer<=0) document.getElementById('st').style.opacity='0';
}

  document.getElementById('tv').textContent=`${m}:${s}`;
  document.getElementById('ht').className=t<30?'hp red':'hp';

}

// ═══════════════════════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════════════════════
const mmCtx=document.getElementById('mm').getContext('2d');
const MM_W=110,MM_H=110,MM_R=130;

function updateMM() {
  const sc=MM_W/(2*MM_R);
  const px0=MM_W/2,py0=MM_H/2;
  mmCtx.clearRect(0,0,MM_W,MM_H);
  mmCtx.save();
  mmCtx.beginPath(); mmCtx.arc(px0,py0,MM_W/2-1,0,Math.PI*2); mmCtx.clip();
  mmCtx.fillStyle='#0a1218'; mmCtx.fillRect(0,0,MM_W,MM_H);
  mmCtx.save();
  mmCtx.translate(px0,py0); mmCtx.rotate(G.hdg); mmCtx.translate(-px0,-py0);
  ROAD_SEGS.forEach(s => {
    const x1=px0+(s.x1-G.pos.x)*sc,y1=py0+(s.z1-G.pos.z)*sc;
    const x2=px0+(s.x2-G.pos.x)*sc,y2=py0+(s.z2-G.pos.z)*sc;
    mmCtx.strokeStyle=s.isHwy?'#888':'#404040';
    mmCtx.lineWidth=Math.max(1,s.w*sc*0.55);
    mmCtx.lineCap='round';
    mmCtx.beginPath(); mmCtx.moveTo(x1,y1); mmCtx.lineTo(x2,y2); mmCtx.stroke();
  });
  G.pax.forEach(p => {
    if (!p.active) return;
    const x=px0+(p.pos.x-G.pos.x)*sc,y=py0+(p.pos.z-G.pos.z)*sc;
    if (x<0||x>MM_W||y<0||y>MM_H) return;
    mmCtx.fillStyle='#00FF88';
    mmCtx.beginPath(); mmCtx.arc(x,y,3,0,Math.PI*2); mmCtx.fill();
  });
  if (G.carState==='RIDE'||G.carState==='WAIT') {
    const dx=G.dest.pos.x-G.pos.x,dz=G.dest.pos.z-G.pos.z;
    const x=px0+dx*sc,y=py0+dz*sc;
    if (x>=0&&x<=MM_W&&y>=0&&y<=MM_H) {
      mmCtx.fillStyle='#FF4400';
      mmCtx.beginPath(); mmCtx.arc(x,y,4,0,Math.PI*2); mmCtx.fill();
    } else {
      const ang=Math.atan2(dx,dz),er=42;
      const ex=px0+Math.sin(ang)*er,ey=py0+Math.cos(ang)*er;
      mmCtx.fillStyle='#FF4400';
      mmCtx.save(); mmCtx.translate(ex,ey); mmCtx.rotate(ang);
      mmCtx.beginPath(); mmCtx.moveTo(0,-6); mmCtx.lineTo(4,4); mmCtx.lineTo(-4,4);
      mmCtx.closePath(); mmCtx.fill(); mmCtx.restore();
    }
  }
  mmCtx.restore();
  mmCtx.fillStyle='#FFD700';
  mmCtx.save(); mmCtx.translate(px0,py0);
  mmCtx.beginPath(); mmCtx.moveTo(0,-6); mmCtx.lineTo(4,5); mmCtx.lineTo(-4,5);
  mmCtx.closePath(); mmCtx.fill(); mmCtx.restore();
  mmCtx.restore();
  mmCtx.strokeStyle='rgba(255,200,0,.6)'; mmCtx.lineWidth=1.5;
  mmCtx.beginPath(); mmCtx.arc(px0,py0,MM_W/2-1,0,Math.PI*2); mmCtx.stroke();
}

// ═══════════════════════════════════════════════════════════════
//  PASSENGER COLOR
// ═══════════════════════════════════════════════════════════════
function updatePaxColor(p) {
  const d=p.pos.distanceTo(G.dest.pos);
  let col;
  if      (d<45)  col=0x00DD44;
  else if (d<100) col=0xDDAA00;
  else if (d<200) col=0xFF3300;
  else            col=0xAA44FF;
  if (p.mesh) {
    [0,1,2].forEach(ci=>{
      const child=p.mesh.children[ci];
      if (child&&child.material) child.material.color.setHex(col);
    });
  }
  p.color=col;
}

function endGame() {
  G.phase='END'; stopEngine();
  const r=getRank(G.earn);
  const RC={S:'#8B6800',A:'#8B3000',B:'#005599',C:'#006622',D:'#880044',E:'#555'};
  document.getElementById('rr').textContent=`ランク ${r}`;
  document.getElementById('rr').style.color=RC[r]||'#333';
  document.getElementById('rm').textContent=G.earn.toLocaleString();
  document.getElementById('rl').textContent=r;
  document.getElementById('rdeliveries').textContent=
    `送迎数: ${G.deliveries}回　最大コンボ: ×${(G.maxCombo||G.combo).toFixed(1)}`;
  document.getElementById('rconsec').textContent=
    G.maxConsec>=3?`🔥 最大連続送迎: ${G.maxConsec}回！`:'';
  document.getElementById('result').style.display='flex';
}

function startGame() {
  document.getElementById('charsel').style.display='none';
  document.getElementById('vehiclesel').style.display='none';
  document.getElementById('result').style.display='none';
  G.phase='PLAY'; G.carState='SEEK';
  engineStarted=false; startEngine();
  G.timer=75; G.earn=0; G.deliveries=0;
  G.spd=0; G.hdg=0; G.tripDist=0;
  G.etTimer=0; G.stTimer=0;
  G.combo=1.0; G.tripTips=0;
  G.paxTimer=0; G.paxTimerMax=60;
  G.consec=0; G.maxConsec=0; G.maxCombo=1.0;
  G.driftTimer=0; G.driftCool=0; G.dashCool=0;
  G.meterFare=700; G.meterNextTick=1150; G.meterFlash=0;
  G.inAir=false; G.jumpVel=0; G.jumpCool=0;
  // ── OSM座標での開始位置: 平和大通り 相生橋付近 ──
  G.pos.set(-50, .5, 0);
  camPos.set(-40, 8, 12);
  paxRespawnT=-1; extraPaxI=0; destI=0; onHighwaySince=-1;
  shakeTimer=0; lastHitTime=-9999999; tramLastNearMs=-9999999; npcLastNearMs=-9999999;
  trams.forEach(tr=>{
    const r=tr.route,len=Math.hypot(r.x2-r.x1,r.z2-r.z1);
    const dx=(r.x2-r.x1)/len,dz=(r.z2-r.z1)/len;
    tr.t=r.t; tr.dir=1;
    tr.mesh.position.set(r.x1+dx*len*r.t,0,r.z1+dz*len*r.t);
    tr.mesh.rotation.y=Math.atan2(-dx,-dz);
  });
  npcs.forEach(npc=>{
    const r=npc.route,len=Math.hypot(r.x2-r.x1,r.z2-r.z1);
    const dx=(r.x2-r.x1)/len,dz=(r.z2-r.z1)/len;
    const nx=-dz,nz2=dx;
    npc.t=r.t;
    npc.mesh.position.set(r.x1+dx*len*r.t+nx*r.lo,0,r.z1+dz*len*r.t+nz2*r.lo);
    npc.mesh.rotation.y=Math.atan2(-dx,-dz);
  });
  G.dest.pos.copy(DEST_POOL[0].pos);
  G.dest.name=DEST_POOL[0].name;
  G.dest.mesh.position.copy(DEST_POOL[0].pos);
  G.dest.mesh.visible=false;
  pickupRing.visible=false; arriveRing.visible=false;
  G.pax.forEach((p,i)=>{
    const src=PAX_INIT[i];
    p.pos.copy(src.pos); p.active=true;
    p.mesh.position.set(src.pos.x,0,src.pos.z);
    p.mesh.visible=true; updatePaxColor(p);
  });
  document.getElementById('et').style.opacity='0';
  document.getElementById('st').style.opacity='0';
  document.getElementById('meter').style.display='none';
  document.getElementById('hd').style.display='none';
  document.getElementById('pax-bar').style.display='none';
  const ch=CHARS[selectedChar];
  showStatus(`${ch.name}で出発！\n${ch.quote}\n🟢 緑マーカーに近づいてゆっくり停車！`,5);
}

// ═══════════════════════════════════════════════════════════════
function animateScene(ts) {
  G.pax.forEach((p,i)=>{ if(p.mesh) p.mesh.position.y=Math.sin(ts*.0018+i*2.1)*.22; });
  if (G.dest.mesh&&G.dest.mesh.visible) {
    G.dest.mesh.rotation.y+=.016;
    G.dest.mesh.position.y=Math.sin(ts*.002)*.18;
  }
  const s=.88+Math.sin(ts*.004)*.12;
  pickupRing.scale.set(s,1,s); arriveRing.scale.set(s,1,s);
  const wr=G.spd*.045;
  wheels.forEach(w=>{ w.children[0].rotation.x+=wr; });
}

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════
let lastT=0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,.05); lastT=ts;
  if (G.phase==='PLAY') {
    G.inp.gasK  = !!(keys['KeyW']||keys['ArrowUp']);
    G.inp.brkK  = !!(keys['Space']);
    G.inp.lK    = !!(keys['KeyA']||keys['ArrowLeft']);
    G.inp.rK    = !!(keys['KeyD']||keys['ArrowRight']);
    G.inp.dashK = !!(keys['ShiftLeft']||keys['ShiftRight']);
    G.inp.revK  = !!(keys['KeyS']||keys['ArrowDown']);
    physics(dt);
    carGrp.position.copy(G.pos);
    carGrp.rotation.y=G.hdg;
    updateCam(dt);
    updateTrams(dt);
    updateNpcs(dt);
    gameLogic(dt);
    updateHUD();
    updateMM();
    updateEngineSound();
  }
  animateScene(ts);
  renderer.render(scene, cam);
}

// ═══════════════════════════════════════════════════════════════
//  SOUND SYSTEM
// ═══════════════════════════════════════════════════════════════
let audioCtx=null, engineOsc=null, engineGain=null, engineStarted=false;
function getAudioCtx() {
  if (!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function startEngine() {
  if (engineStarted) return;
  const ctx=getAudioCtx(); engineStarted=true;
  engineGain=ctx.createGain(); engineGain.gain.value=0; engineGain.connect(ctx.destination);
  engineOsc=ctx.createOscillator(); engineOsc.type='sawtooth'; engineOsc.frequency.value=55;
  const engineOsc2=ctx.createOscillator(); engineOsc2.type='square'; engineOsc2.frequency.value=58;
  const distort=ctx.createWaveShaper();
  const curve=new Float32Array(256);
  for (let i=0;i<256;i++) {
    const x=(i*2)/256-1;
    curve[i]=(Math.PI+300)*x/(Math.PI+300*Math.abs(x));
  }
  distort.curve=curve;
  const gainOsc2=ctx.createGain(); gainOsc2.gain.value=0.3;
  engineOsc.connect(distort); distort.connect(engineGain);
  engineOsc2.connect(gainOsc2); gainOsc2.connect(engineGain);
  engineOsc.start(); engineOsc2.start(); engineOsc._osc2=engineOsc2;
}
function updateEngineSound() {
  if (!engineGain||!engineOsc||G.phase!=='PLAY') return;
  const ctx=getAudioCtx(),now=ctx.currentTime;
  const spd=Math.abs(G.spd);
  const freq=45+spd*4.5;
  const vol=spd<0.5?0.04:Math.min(0.22,0.05+spd*0.006);
  engineOsc.frequency.setTargetAtTime(freq,now,0.1);
  if (engineOsc._osc2) engineOsc._osc2.frequency.setTargetAtTime(freq*1.055,now,0.1);
  engineGain.gain.setTargetAtTime(vol,now,0.08);
}
function stopEngine() {
  if (!engineGain) return;
  const ctx=getAudioCtx();
  engineGain.gain.setTargetAtTime(0,ctx.currentTime,0.3);
  if (engineOsc&&engineOsc._osc2) {
    try { engineOsc._osc2.stop(ctx.currentTime+0.5); } catch(e) {}
  }
  if (engineOsc) {
    try { engineOsc.stop(ctx.currentTime+0.5); } catch(e) {}
  }
  engineOsc=null; engineGain=null; engineStarted=false;
}
function playTone(freq,type,vol,dur,decay=0.15) {
  try {
    const ctx=getAudioCtx(),osc=ctx.createOscillator(),g=ctx.createGain();
    osc.type=type; osc.frequency.value=freq;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+dur+decay);
  } catch(e) {}
}
function playNoise(vol,dur,freq=800,q=1) {
  try {
    const ctx=getAudioCtx();
    const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for (let i=0;i<data.length;i++) data[i]=Math.random()*2-1;
    const src=ctx.createBufferSource(),filter=ctx.createBiquadFilter(),g=ctx.createGain();
    src.buffer=buf; filter.type='bandpass'; filter.frequency.value=freq; filter.Q.value=q;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    src.connect(filter); filter.connect(g); g.connect(ctx.destination); src.start();
  } catch(e) {}
}
function sndPickup() { [523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.18,0.18),i*90)); }
function sndArrive(isKamikaze) {
  if (isKamikaze) {
    [[523,0],[659,80],[784,160],[1047,260],[1319,360],[784,500],[1047,600]].forEach(([f,t])=>
      setTimeout(()=>playTone(f,'square',0.12,0.18),t));
    setTimeout(()=>playNoise(0.15,0.25,1200,2),600);
  } else { [659,880].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.15,0.22),i*110)); }
}
function sndGood()  { playTone(523,'sine',0.12,0.2); }
function sndCollision() { playTone(80,'sawtooth',0.3,0.35); playNoise(0.35,0.3,300,0.8); }
function sndNearMiss() {
  try {
    const ctx=getAudioCtx(),osc=ctx.createOscillator(),g=ctx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(1200,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300,ctx.currentTime+0.25);
    g.gain.setValueAtTime(0.14,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.3);
  } catch(e) {}
}
function sndDrift() { playNoise(0.18,0.35,2200,4); }
function sndJump() {
  try {
    const ctx=getAudioCtx(),osc=ctx.createOscillator(),g=ctx.createGain();
    osc.type='square';
    osc.frequency.setValueAtTime(200,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800,ctx.currentTime+0.3);
    g.gain.setValueAtTime(0.12,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.45);
  } catch(e) {}
}
function sndTimeout() { [440,349,262].forEach((f,i)=>setTimeout(()=>playTone(f,'square',0.14,0.2),i*130)); }
function sndDash() {
  try {
    const ctx=getAudioCtx(),osc=ctx.createOscillator(),g=ctx.createGain();
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(150,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400,ctx.currentTime+0.15);
    g.gain.setValueAtTime(0.1,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
    osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.22);
  } catch(e) {}
}
function sndMeterTick() {
  try {
    const ctx=getAudioCtx(),osc=ctx.createOscillator(),g=ctx.createGain();
    osc.type='square'; osc.frequency.value=1800;
    g.gain.setValueAtTime(0.08,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.06);
    osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.07);
  } catch(e) {}
}
